<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>melt — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to bottom, #e8eef5, #d0dce8);
      overflow: hidden; 
      font-family: Georgia, serif;
      min-height: 100vh;
    }
    canvas { display: block; }
    
    .nav-btn {
      position: fixed;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(100, 130, 160, 0.3);
      background: rgba(255, 255, 255, 0.4);
      color: rgba(60, 90, 120, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .nav-btn:hover {
      border-color: rgba(100, 130, 160, 0.6);
      color: rgba(60, 90, 120, 0.95);
      background: rgba(255, 255, 255, 0.7);
    }
    #homeBtn { left: 20px; }
    #infoBtn { right: 20px; }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(100, 130, 160, 0.2);
      border-radius: 8px;
      padding: 20px;
      color: rgba(40, 60, 80, 0.9);
      font-size: 14px;
      line-height: 1.6;
      display: none;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    #info h3 {
      color: rgba(40, 70, 100, 0.95);
      margin-bottom: 10px;
      font-weight: normal;
      font-style: italic;
    }
    #info p { margin-bottom: 8px; }
    #info .close {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
      color: rgba(100, 130, 160, 0.5);
    }
    
    #start-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(80, 110, 140, 0.6);
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.5px;
      z-index: 50;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    
    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(80, 110, 140, 0.5);
      font-size: 12px;
      font-style: italic;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <button id="homeBtn" class="nav-btn" title="Back to gallery">←</button>
  <button id="infoBtn" class="nav-btn" title="About this piece">?</button>
  
  <div id="info">
    <span class="close">×</span>
    <h3>melt</h3>
    <p>Ice holds its shape until it doesn't. The transition happens slowly, then all at once.</p>
    <p>Move close to add warmth. Watch the form dissolve. The water remembers nothing of being solid.</p>
    <p>Click to add a new piece of ice.</p>
    <p><em>What remains when form is lost?</em></p>
  </div>
  
  <div id="start-prompt">click to begin</div>
  <div id="status"></div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    
    let width, height;
    let audioStarted = false;
    let audioCtx, masterGain;
    
    // Mouse
    let mouseX = -1000, mouseY = -1000;
    
    // Ice chunks
    let iceChunks = [];
    
    // Water pool
    let poolWater = 0;
    let poolRipples = [];
    
    // Drips
    let drips = [];
    
    // Surface (where ice sits)
    let surfaceY;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      surfaceY = height * 0.7;
      
      if (iceChunks.length === 0) {
        spawnIce(width / 2);
      }
    }
    
    function spawnIce(x) {
      const size = 80 + Math.random() * 60;
      iceChunks.push({
        x: x,
        y: surfaceY,
        baseWidth: size,
        baseHeight: size * (0.8 + Math.random() * 0.4),
        mass: 1.0, // 1.0 = full, 0 = melted
        vertices: generateIceVertices(size),
        cracks: [],
        lastCrackTime: 0,
        meltDrips: [] // Where water drips from
      });
    }
    
    function generateIceVertices(size) {
      const vertices = [];
      const sides = 6 + Math.floor(Math.random() * 4);
      for (let i = 0; i < sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const r = size * (0.4 + Math.random() * 0.2);
        vertices.push({
          baseX: Math.cos(angle) * r,
          baseY: Math.sin(angle) * r * 0.7, // Slightly flattened
          wobble: Math.random() * Math.PI * 2
        });
      }
      return vertices;
    }
    
    function getWarmth(chunk) {
      // How much warmth from cursor
      const dx = mouseX - chunk.x;
      const dy = mouseY - chunk.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 200;
      
      if (dist > maxDist) return 0;
      return Math.pow(1 - dist / maxDist, 2) * 0.8;
    }
    
    function updateIce(chunk, dt) {
      // Base melt rate + warmth from cursor
      const baseMelt = 0.0001;
      const warmth = getWarmth(chunk);
      const meltRate = baseMelt + warmth * 0.002;
      
      chunk.mass -= meltRate * dt;
      
      if (chunk.mass <= 0) {
        chunk.mass = 0;
        return;
      }
      
      // Water drips as it melts
      if (Math.random() < meltRate * dt * 50) {
        const v = chunk.vertices[Math.floor(Math.random() * chunk.vertices.length)];
        const scale = Math.sqrt(chunk.mass);
        drips.push({
          x: chunk.x + v.baseX * scale,
          y: chunk.y + v.baseY * scale,
          vy: 0
        });
        playDrip();
      }
      
      // Occasional crack sound
      const now = Date.now();
      if (now - chunk.lastCrackTime > 3000 && Math.random() < 0.001) {
        chunk.lastCrackTime = now;
        playCrack();
        // Add visual crack
        if (chunk.cracks.length < 5) {
          chunk.cracks.push({
            x1: (Math.random() - 0.5) * chunk.baseWidth * 0.5,
            y1: (Math.random() - 0.5) * chunk.baseHeight * 0.3,
            x2: (Math.random() - 0.5) * chunk.baseWidth * 0.5,
            y2: (Math.random() - 0.5) * chunk.baseHeight * 0.3,
            alpha: 1
          });
        }
      }
      
      // Fade cracks
      chunk.cracks.forEach(c => {
        c.alpha *= 0.995;
      });
      chunk.cracks = chunk.cracks.filter(c => c.alpha > 0.1);
    }
    
    function drawIce(chunk) {
      if (chunk.mass <= 0) return;
      
      const scale = Math.sqrt(chunk.mass);
      const time = Date.now() * 0.001;
      
      ctx.save();
      ctx.translate(chunk.x, chunk.y);
      
      // Ice glow (subtle)
      const warmth = getWarmth(chunk);
      if (warmth > 0) {
        const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, chunk.baseWidth * scale);
        glowGrad.addColorStop(0, `rgba(255, 200, 150, ${warmth * 0.1})`);
        glowGrad.addColorStop(1, 'rgba(255, 200, 150, 0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(-chunk.baseWidth, -chunk.baseHeight, chunk.baseWidth * 2, chunk.baseHeight * 2);
      }
      
      // Main ice body
      ctx.beginPath();
      chunk.vertices.forEach((v, i) => {
        const wobble = Math.sin(time + v.wobble) * 2 * (1 - chunk.mass);
        const x = v.baseX * scale + wobble;
        const y = v.baseY * scale - chunk.baseHeight * scale * 0.3; // Lift up to sit on surface
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      
      // Ice gradient - translucent blue-white
      const grad = ctx.createLinearGradient(0, -chunk.baseHeight * scale * 0.5, 0, chunk.baseHeight * scale * 0.3);
      grad.addColorStop(0, 'rgba(220, 240, 255, 0.9)');
      grad.addColorStop(0.3, 'rgba(180, 210, 235, 0.85)');
      grad.addColorStop(0.7, 'rgba(150, 190, 220, 0.8)');
      grad.addColorStop(1, 'rgba(130, 170, 200, 0.75)');
      
      ctx.fillStyle = grad;
      ctx.fill();
      
      // Ice edge highlight
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Internal highlights
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-chunk.baseWidth * scale * 0.2, -chunk.baseHeight * scale * 0.4);
      ctx.lineTo(chunk.baseWidth * scale * 0.1, -chunk.baseHeight * scale * 0.1);
      ctx.stroke();
      
      // Draw cracks
      chunk.cracks.forEach(c => {
        ctx.strokeStyle = `rgba(100, 150, 180, ${c.alpha * 0.5})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(c.x1 * scale, c.y1 * scale - chunk.baseHeight * scale * 0.3);
        ctx.lineTo(c.x2 * scale, c.y2 * scale - chunk.baseHeight * scale * 0.3);
        ctx.stroke();
      });
      
      // Water sheen on surface (as it melts)
      if (chunk.mass < 0.9) {
        const sheenAlpha = (1 - chunk.mass) * 0.3;
        ctx.fillStyle = `rgba(100, 150, 200, ${sheenAlpha})`;
        ctx.beginPath();
        ctx.ellipse(0, chunk.baseHeight * scale * 0.1, chunk.baseWidth * scale * 0.4, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    }
    
    function updateDrips(dt) {
      drips.forEach((d, i) => {
        d.vy += 0.5; // Gravity
        d.y += d.vy;
        
        if (d.y > surfaceY) {
          // Hit surface, add to pool
          poolWater += 0.001;
          poolRipples.push({
            x: d.x,
            time: 0,
            maxRadius: 20 + Math.random() * 20
          });
          drips.splice(i, 1);
        }
      });
    }
    
    function drawDrips() {
      drips.forEach(d => {
        // Water droplet
        const gradient = ctx.createRadialGradient(d.x, d.y - 2, 0, d.x, d.y, 4);
        gradient.addColorStop(0, 'rgba(180, 210, 240, 0.9)');
        gradient.addColorStop(1, 'rgba(150, 190, 220, 0.6)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, 3, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function updatePool(dt) {
      // Update ripples
      poolRipples.forEach((r, i) => {
        r.time += dt * 0.05;
        if (r.time > 1) {
          poolRipples.splice(i, 1);
        }
      });
      
      // Cap pool water
      poolWater = Math.min(poolWater, 1);
    }
    
    function drawPool() {
      if (poolWater <= 0) return;
      
      const poolHeight = poolWater * 30;
      const poolY = surfaceY;
      
      // Water pool
      const gradient = ctx.createLinearGradient(0, poolY, 0, poolY + poolHeight);
      gradient.addColorStop(0, 'rgba(140, 180, 210, 0.4)');
      gradient.addColorStop(1, 'rgba(120, 160, 190, 0.6)');
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(width / 2, poolY + 2, 100 + poolWater * 150, poolHeight, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Surface highlight
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(width / 2, poolY, 80 + poolWater * 140, poolHeight * 0.5, 0, Math.PI, Math.PI * 2);
      ctx.stroke();
      
      // Ripples
      poolRipples.forEach(r => {
        const radius = r.time * r.maxRadius;
        const alpha = (1 - r.time) * 0.4;
        
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(r.x, poolY + 2, radius, radius * 0.3, 0, 0, Math.PI * 2);
        ctx.stroke();
      });
    }
    
    function drawSurface() {
      // Simple surface/table indication
      ctx.fillStyle = 'rgba(200, 210, 220, 0.3)';
      ctx.fillRect(0, surfaceY + 5, width, height - surfaceY);
      
      // Surface line
      ctx.strokeStyle = 'rgba(150, 170, 190, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, surfaceY + 5);
      ctx.lineTo(width, surfaceY + 5);
      ctx.stroke();
    }
    
    function draw() {
      const now = Date.now();
      const dt = 16; // Approximate frame time
      
      // Clear
      ctx.fillStyle = '#e8eef5';
      ctx.fillRect(0, 0, width, height);
      
      // Draw gradient background
      const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
      bgGrad.addColorStop(0, '#e8eef5');
      bgGrad.addColorStop(1, '#d0dce8');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);
      
      drawSurface();
      drawPool();
      
      // Update and draw ice
      let totalMass = 0;
      iceChunks.forEach(chunk => {
        updateIce(chunk, dt);
        drawIce(chunk);
        totalMass += chunk.mass;
      });
      
      // Remove fully melted chunks
      iceChunks = iceChunks.filter(c => c.mass > 0);
      
      updateDrips(dt);
      drawDrips();
      updatePool(dt);
      
      // Status
      if (iceChunks.length === 0 && poolWater > 0) {
        status.textContent = 'all ice is water now';
        status.style.opacity = '1';
      } else if (totalMass < 0.3 && iceChunks.length > 0) {
        status.textContent = 'almost gone...';
        status.style.opacity = '0.7';
      } else {
        status.style.opacity = '0';
      }
      
      requestAnimationFrame(draw);
    }
    
    // Audio
    let dripOscPool = [];
    
    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      document.getElementById('start-prompt').style.opacity = '0';
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioCtx.destination);
      
      // Start ambient
      startAmbient();
    }
    
    function startAmbient() {
      // Cold ambient drone - high, crystalline
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      
      osc1.type = 'sine';
      osc1.frequency.value = 880;
      osc2.type = 'sine';
      osc2.frequency.value = 1320; // Perfect fifth
      
      filter.type = 'lowpass';
      filter.frequency.value = 2000;
      filter.Q.value = 1;
      
      gain.gain.value = 0.03;
      
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      osc1.start();
      osc2.start();
      
      // Subtle LFO on filter
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.1;
      lfoGain.gain.value = 500;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);
      lfo.start();
    }
    
    function playDrip() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200 + Math.random() * 400, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
      
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      
      osc.connect(gain);
      gain.connect(masterGain);
      
      osc.start(now);
      osc.stop(now + 0.15);
    }
    
    function playCrack() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      // Ice crack - sharp noise burst
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 2000;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.2;
      
      source.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      source.start(now);
    }
    
    // Events
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    });
    
    canvas.addEventListener('mouseleave', () => {
      mouseX = -1000;
      mouseY = -1000;
    });
    
    canvas.addEventListener('click', (e) => {
      initAudio();
      // Add new ice if clicked on empty area
      const clickedOnIce = iceChunks.some(c => {
        const dx = e.clientX - c.x;
        const dy = e.clientY - c.y;
        return Math.sqrt(dx * dx + dy * dy) < c.baseWidth * Math.sqrt(c.mass);
      });
      
      if (!clickedOnIce || iceChunks.length === 0) {
        spawnIce(e.clientX);
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      initAudio();
    });
    
    // Navigation
    document.getElementById('homeBtn').onclick = () => {
      window.location.href = '/';
    };
    
    document.getElementById('infoBtn').onclick = () => {
      document.getElementById('info').style.display = 'block';
    };
    
    document.querySelector('#info .close').onclick = () => {
      document.getElementById('info').style.display = 'none';
    };
    
    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
