<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dominoes — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #1a1612; 
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    canvas { display: block; }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      max-width: 300px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.5s;
    }
    
    #info.visible { opacity: 1; }
    
    .nav-btn {
      position: fixed;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }
    
    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.9);
    }
    
    #home-btn { left: 20px; }
    #info-btn { right: 20px; }
    
    #controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
    
    .control-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .control-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.9);
    }
    
    #mode-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button class="nav-btn" id="home-btn" title="Back to gallery">←</button>
  <button class="nav-btn" id="info-btn" title="About this piece">?</button>
  
  <div id="mode-indicator">drag to place • click domino to push</div>
  
  <div id="controls">
    <button class="control-btn" id="clear-btn">clear</button>
    <button class="control-btn" id="preset-btn">spiral</button>
  </div>
  
  <div id="info">
    <strong>dominoes</strong><br><br>
    Drag to place dominoes in a line. Click any standing domino to push it.<br><br>
    Watch the chain reaction. Listen to the cascade.<br><br>
    Small causes, large effects. The satisfaction of seeing it all fall.<br><br>
    <em>Press 'spiral' for a preset pattern.</em>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    // Navigation
    document.getElementById('home-btn').onclick = () => window.location.href = '/';
    document.getElementById('info-btn').onclick = () => {
      document.getElementById('info').classList.toggle('visible');
    };
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let dominoes = [];
    let audioStarted = false;
    let audioCtx, masterGain;
    let isDrawing = false;
    let lastPlacePos = null;
    
    const DOMINO_WIDTH = 8;
    const DOMINO_HEIGHT = 40;
    const PLACE_SPACING = 20;
    const FALL_SPEED = 0.08;
    const KNOCK_DISTANCE = 25;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Domino {
      constructor(x, y, angle = 0) {
        this.x = x;
        this.y = y;
        this.baseAngle = angle; // Direction it's facing (radians)
        this.fallAngle = 0; // How far it's fallen (0 = standing, PI/2 = flat)
        this.falling = false;
        this.fallDirection = 1; // 1 = forward, -1 = backward
        this.fallen = false;
        this.velocity = 0;
        
        // Slight color variation
        this.hue = 25 + Math.random() * 15; // Warm wood tones
        this.lightness = 35 + Math.random() * 10;
      }
      
      push(direction = 1) {
        if (this.fallen || this.falling) return;
        this.falling = true;
        this.fallDirection = direction;
        this.velocity = 0.02;
        playClick(this.x, this.y);
      }
      
      update(dominoes) {
        if (!this.falling || this.fallen) return;
        
        // Accelerate fall (gravity)
        this.velocity += 0.004;
        this.fallAngle += this.velocity;
        
        // Check if we hit the ground
        if (this.fallAngle >= Math.PI / 2) {
          this.fallAngle = Math.PI / 2;
          this.fallen = true;
          this.falling = false;
          playThud(this.x, this.y);
          return;
        }
        
        // Check collision with other dominoes
        const tipX = this.x + Math.cos(this.baseAngle) * Math.sin(this.fallAngle * this.fallDirection) * DOMINO_HEIGHT;
        const tipY = this.y + Math.sin(this.baseAngle) * Math.sin(this.fallAngle * this.fallDirection) * DOMINO_HEIGHT;
        
        for (const other of dominoes) {
          if (other === this || other.fallen || other.falling) continue;
          
          const dx = other.x - tipX;
          const dy = other.y - tipY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < KNOCK_DISTANCE) {
            // Determine push direction based on relative position
            const relativeAngle = Math.atan2(other.y - this.y, other.x - this.x);
            const angleDiff = relativeAngle - other.baseAngle;
            const pushDir = Math.cos(angleDiff) > 0 ? 1 : -1;
            other.push(pushDir);
          }
        }
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.baseAngle);
        
        // Apply fall rotation
        const fallRotation = this.fallAngle * this.fallDirection;
        
        // Calculate domino rectangle corners considering fall
        const standingHeight = DOMINO_HEIGHT * Math.cos(this.fallAngle);
        const shadowOffset = DOMINO_HEIGHT * Math.sin(this.fallAngle) * this.fallDirection;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(shadowOffset * 0.5, 2, DOMINO_WIDTH + this.fallAngle * 5, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Domino body
        ctx.rotate(fallRotation);
        
        // Main face
        const gradient = ctx.createLinearGradient(-DOMINO_WIDTH/2, -DOMINO_HEIGHT/2, DOMINO_WIDTH/2, DOMINO_HEIGHT/2);
        gradient.addColorStop(0, `hsl(${this.hue}, 30%, ${this.lightness + 10}%)`);
        gradient.addColorStop(1, `hsl(${this.hue}, 30%, ${this.lightness - 5}%)`);
        
        ctx.fillStyle = gradient;
        ctx.fillRect(-DOMINO_WIDTH/2, -DOMINO_HEIGHT/2, DOMINO_WIDTH, DOMINO_HEIGHT);
        
        // Edge highlight
        ctx.strokeStyle = `hsl(${this.hue}, 20%, ${this.lightness + 20}%)`;
        ctx.lineWidth = 1;
        ctx.strokeRect(-DOMINO_WIDTH/2, -DOMINO_HEIGHT/2, DOMINO_WIDTH, DOMINO_HEIGHT);
        
        // Dots (simplified)
        ctx.fillStyle = `hsl(${this.hue}, 10%, ${this.lightness - 15}%)`;
        const dotRadius = 2;
        
        // Top section - 2 dots
        ctx.beginPath();
        ctx.arc(-2, -DOMINO_HEIGHT/4 - 3, dotRadius, 0, Math.PI * 2);
        ctx.arc(2, -DOMINO_HEIGHT/4 + 3, dotRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // Divider line
        ctx.strokeStyle = `hsl(${this.hue}, 10%, ${this.lightness - 10}%)`;
        ctx.beginPath();
        ctx.moveTo(-DOMINO_WIDTH/2 + 1, 0);
        ctx.lineTo(DOMINO_WIDTH/2 - 1, 0);
        ctx.stroke();
        
        // Bottom section - 3 dots
        ctx.fillStyle = `hsl(${this.hue}, 10%, ${this.lightness - 15}%)`;
        ctx.beginPath();
        ctx.arc(0, DOMINO_HEIGHT/4, dotRadius, 0, Math.PI * 2);
        ctx.arc(-2, DOMINO_HEIGHT/4 + 6, dotRadius, 0, Math.PI * 2);
        ctx.arc(2, DOMINO_HEIGHT/4 - 6, dotRadius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
    }
    
    function init() {
      resize();
      dominoes = [];
    }
    
    // Audio
    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioCtx.destination);
    }
    
    function playClick(x, y) {
      if (!audioStarted) return;
      
      const now = audioCtx.currentTime;
      
      // High click sound
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      
      // Pitch based on position
      const basePitch = 800 + (y / height) * 400;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(basePitch, now);
      osc.frequency.exponentialRampToValueAtTime(basePitch * 0.5, now + 0.05);
      
      filter.type = 'highpass';
      filter.frequency.value = 500;
      
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      osc.start(now);
      osc.stop(now + 0.08);
    }
    
    function playThud(x, y) {
      if (!audioStarted) return;
      
      const now = audioCtx.currentTime;
      
      // Low thud
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
      
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      
      osc.connect(gain);
      gain.connect(masterGain);
      
      osc.start(now);
      osc.stop(now + 0.15);
      
      // Noise burst
      const bufferSize = audioCtx.sampleRate * 0.05;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() - 0.5) * Math.exp(-i / (bufferSize * 0.2));
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.08;
      
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = 300;
      
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterGain);
      
      noise.start(now);
    }
    
    function placeDomino(x, y, angle) {
      // Check if too close to existing domino
      for (const d of dominoes) {
        const dx = d.x - x;
        const dy = d.y - y;
        if (Math.sqrt(dx * dx + dy * dy) < PLACE_SPACING * 0.7) {
          return false;
        }
      }
      
      dominoes.push(new Domino(x, y, angle));
      return true;
    }
    
    function createSpiral() {
      dominoes = [];
      
      const centerX = width / 2;
      const centerY = height / 2;
      const turns = 3;
      const count = 80;
      const startRadius = 30;
      const endRadius = Math.min(width, height) * 0.4;
      
      for (let i = 0; i < count; i++) {
        const t = i / count;
        const angle = t * turns * Math.PI * 2;
        const radius = startRadius + t * (endRadius - startRadius);
        
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;
        
        // Angle tangent to spiral
        const tangent = angle + Math.PI / 2;
        
        dominoes.push(new Domino(x, y, tangent));
      }
    }
    
    function animate() {
      // Clear with warm background
      ctx.fillStyle = '#1a1612';
      ctx.fillRect(0, 0, width, height);
      
      // Subtle wood grain texture
      ctx.fillStyle = 'rgba(30, 25, 20, 0.3)';
      for (let i = 0; i < 20; i++) {
        const y = (i / 20) * height;
        ctx.fillRect(0, y, width, 2);
      }
      
      // Update and draw dominoes
      for (const domino of dominoes) {
        domino.update(dominoes);
      }
      
      // Sort by y for depth (draw further ones first)
      const sorted = [...dominoes].sort((a, b) => a.y - b.y);
      for (const domino of sorted) {
        domino.draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    // Input handling
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches) {
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      }
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    
    function startDraw(e) {
      initAudio();
      const pos = getPos(e);
      
      // Check if clicking an existing domino
      for (const domino of dominoes) {
        const dx = domino.x - pos.x;
        const dy = domino.y - pos.y;
        if (Math.sqrt(dx * dx + dy * dy) < 20 && !domino.fallen) {
          domino.push(1);
          return;
        }
      }
      
      isDrawing = true;
      lastPlacePos = pos;
      placeDomino(pos.x, pos.y, 0);
    }
    
    function moveDraw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      
      const pos = getPos(e);
      
      if (lastPlacePos) {
        const dx = pos.x - lastPlacePos.x;
        const dy = pos.y - lastPlacePos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist >= PLACE_SPACING) {
          const angle = Math.atan2(dy, dx);
          
          // Place dominoes along the path
          const steps = Math.floor(dist / PLACE_SPACING);
          for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const x = lastPlacePos.x + dx * t;
            const y = lastPlacePos.y + dy * t;
            placeDomino(x, y, angle);
          }
          
          lastPlacePos = pos;
        }
      }
    }
    
    function endDraw() {
      isDrawing = false;
      lastPlacePos = null;
    }
    
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', moveDraw);
    canvas.addEventListener('touchend', endDraw);
    
    document.getElementById('clear-btn').onclick = () => {
      dominoes = [];
    };
    
    document.getElementById('preset-btn').onclick = () => {
      initAudio();
      createSpiral();
    };
    
    window.addEventListener('resize', resize);
    
    init();
    animate();
  </script>
</body>
</html>
