<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>bauhaus — beat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: #f5f5f0;
      touch-action: none;
    }
    canvas { display: block; }
    #back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(0,0,0,0.3);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 100;
      transition: color 0.3s;
    }
    #back:hover { color: rgba(0,0,0,0.7); }
    #start {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0,0,0,0.5);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      background: none;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 100;
    }
    #start:hover {
      color: rgba(0,0,0,0.8);
      border-color: rgba(0,0,0,0.4);
    }
    #start.hidden { display: none; }
  </style>
</head>
<body>
  <a id="back" href="/">← back</a>
  <button id="start">play</button>
  <canvas id="canvas"></canvas>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start');
    
    let width, height;
    let isPlaying = false;
    
    // Bauhaus colors - exact match
    const COLORS = {
      red: '#E53935',
      yellow: '#FDD835',
      blue: '#1E88E5',
      black: '#212121',
      cream: '#F5F5F0'
    };
    const colorList = [COLORS.red, COLORS.yellow, COLORS.blue, COLORS.black];
    
    // Grid system - matches original
    let elements = [];
    let cols, rows, cellSize;
    
    // Cycles (in 8th notes)
    const CYCLES = {
      circle: 8,      // Kick: steady 4/4 anchor
      triangle: 6,    // Snare: polyrhythm
      square: 10,     // Hat: slower cycle to reduce dominance
      halfCircle: 7   // Blip: polyrhythm
    };
    
    // Only non-kicks get offsets
    const ALLOW_OFFSET = {
      circle: false,
      triangle: true,
      square: true,
      halfCircle: true
    };
    
    // Audio
    let kick, snare, hat, blip;
    let reverb;
    let stepCount = 0;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      // Grid sizing - matches original exactly
      cellSize = Math.min(width, height) / 8;
      cols = Math.ceil(width / cellSize);
      rows = Math.ceil(height / cellSize);
    }
    
    function initAudio() {
      reverb = new Tone.Reverb({ decay: 2, wet: 0.25 }).toDestination();
      
      kick = new Tone.MembraneSynth({
        pitchDecay: 0.08,
        octaves: 5,
        oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 0.8 }
      }).connect(reverb);
      kick.volume.value = -8;
      
      snare = new Tone.NoiseSynth({
        noise: { type: 'pink' },
        envelope: { attack: 0.005, decay: 0.12, sustain: 0, release: 0.1 }
      }).connect(reverb);
      snare.volume.value = -14;
      
      hat = new Tone.MetalSynth({
        frequency: 300,
        envelope: { attack: 0.001, decay: 0.04, release: 0.01 },
        harmonicity: 4,
        modulationIndex: 20,
        resonance: 3000,
        octaves: 1
      }).connect(reverb);
      hat.volume.value = -22;
      
      blip = new Tone.Synth({
        oscillator: { type: 'triangle' },
        envelope: { attack: 0.02, decay: 0.15, sustain: 0.1, release: 0.4 }
      }).connect(reverb);
      blip.volume.value = -12;
    }
    
    function generateElements() {
      elements = [];
      
      // Balanced type distribution
      // Favor kicks and melodic blips, fewer hats
      const typeWeights = [
        'circle', 'circle', 'circle',           // 3x kick
        'triangle', 'triangle',                  // 2x snare
        'square',                                // 1x hat (reduced)
        'halfCircle', 'halfCircle', 'halfCircle' // 3x blip
      ];
      
      // Size options - matches original
      const sizes = [0.5, 0.7, 0.9];
      const rotations = [0, Math.PI/2, Math.PI, Math.PI * 1.5];
      
      // Generate on grid - matches original exactly
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          // ~35% fill rate like original
          if (Math.random() > 0.35) continue;
          
          const type = typeWeights[Math.floor(Math.random() * typeWeights.length)];
          const color = colorList[Math.floor(Math.random() * colorList.length)];
          
          elements.push({
            // Grid position - matches original
            gridX: col,
            gridY: row,
            x: col * cellSize,
            y: row * cellSize,
            type,
            color,
            size: sizes[Math.floor(Math.random() * sizes.length)] * cellSize,
            rotation: rotations[Math.floor(Math.random() * rotations.length)],
            offset: ALLOW_OFFSET[type] ? Math.floor(Math.random() * CYCLES[type]) : 0,
            triggered: false,
            triggerTime: 0
          });
        }
      }
    }
    
    function getPitch(color, rotation) {
      const basePitches = {
        [COLORS.red]: 0,
        [COLORS.yellow]: 4,
        [COLORS.blue]: 7,
        [COLORS.black]: -5
      };
      const rotationOffset = Math.round(rotation / (Math.PI/2)) * 2;
      return (basePitches[color] || 0) + rotationOffset;
    }
    
    function getNoteFromPitch(pitchOffset) {
      const notes = ['C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4'];
      const baseIndex = 4;
      return notes[Math.max(0, Math.min(notes.length - 1, baseIndex + pitchOffset))];
    }
    
    function step() {
      const time = Tone.now();
      
      for (const el of elements) {
        const cycle = CYCLES[el.type];
        const effectiveStep = (stepCount + el.offset) % cycle;
        
        if (effectiveStep === 0) {
          el.triggered = true;
          el.triggerTime = Date.now();
          
          const velocity = 0.4 + (el.size / cellSize) * 0.4;
          const pitchOffset = getPitch(el.color, el.rotation);
          
          switch(el.type) {
            case 'circle':
              kick.triggerAttackRelease(38 + pitchOffset * 2, '4n', time, velocity);
              break;
            case 'triangle':
              snare.triggerAttackRelease('8n', time, velocity * 0.7);
              break;
            case 'square':
              hat.triggerAttackRelease('16n', time, velocity * 0.4);
              break;
            case 'halfCircle':
              const note = getNoteFromPitch(pitchOffset);
              blip.triggerAttackRelease(note, '8n', time, velocity * 0.8);
              break;
          }
        }
      }
      
      stepCount++;
    }
    
    function draw() {
      ctx.fillStyle = COLORS.cream;
      ctx.fillRect(0, 0, width, height);
      
      // Grid lines - matches original
      ctx.strokeStyle = 'rgba(200, 200, 195, 1)';
      ctx.lineWidth = 1;
      
      for (let x = 0; x <= width; x += cellSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y += cellSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      
      const now = Date.now();
      
      // Draw elements - centered in cells like original
      for (const el of elements) {
        ctx.save();
        
        // Center in cell - matches original
        ctx.translate(el.x + cellSize/2, el.y + cellSize/2);
        ctx.rotate(el.rotation);
        
        // Trigger animation
        const timeSinceTrigger = now - el.triggerTime;
        const isTriggered = el.triggered && timeSinceTrigger < 150;
        const scale = isTriggered ? 1 + (1 - timeSinceTrigger / 150) * 0.15 : 1;
        
        if (el.triggered && timeSinceTrigger > 150) {
          el.triggered = false;
        }
        
        if (isTriggered) {
          ctx.shadowColor = el.color;
          ctx.shadowBlur = 25 * (1 - timeSinceTrigger / 150);
        }
        
        ctx.fillStyle = el.color;
        const s = el.size * scale;
        
        switch(el.type) {
          case 'circle':
            ctx.beginPath();
            ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
            ctx.fill();
            break;
          case 'square':
            ctx.fillRect(-s/2, -s/2, s, s);
            break;
          case 'triangle':
            ctx.beginPath();
            ctx.moveTo(0, -s/2);
            ctx.lineTo(-s/2, s/2);
            ctx.lineTo(s/2, s/2);
            ctx.closePath();
            ctx.fill();
            break;
          case 'halfCircle':
            ctx.beginPath();
            ctx.arc(0, 0, s/2, 0, Math.PI);
            ctx.fill();
            break;
        }
        
        ctx.restore();
      }
    }
    
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    let loop;
    
    async function start() {
      if (isPlaying) {
        generateElements();
        stepCount = 0;
        return;
      }
      
      await Tone.start();
      initAudio();
      generateElements();
      
      isPlaying = true;
      startBtn.classList.add('hidden');
      
      Tone.Transport.bpm.value = 110;
      
      loop = new Tone.Loop((time) => {
        Tone.Draw.schedule(() => step(), time);
      }, '8n').start(0);
      
      Tone.Transport.start();
    }
    
    startBtn.addEventListener('click', start);
    canvas.addEventListener('click', () => start());
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
    
    window.addEventListener('resize', () => {
      resize();
      if (elements.length) generateElements();
    });
    
    resize();
    generateElements();
    animate();
  </script>
</body>
</html>
