<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>bauhaus — beat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: #f5f5f0;
      touch-action: none;
    }
    canvas { display: block; }
    #back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(0,0,0,0.3);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 100;
      transition: color 0.3s;
    }
    #back:hover { color: rgba(0,0,0,0.7); }
    #start {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0,0,0,0.5);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      background: none;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 100;
    }
    #start:hover {
      color: rgba(0,0,0,0.8);
      border-color: rgba(0,0,0,0.4);
    }
    #start.hidden { display: none; }
  </style>
</head>
<body>
  <a id="back" href="/">← back</a>
  <button id="start">play</button>
  <canvas id="canvas"></canvas>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start');
    
    let width, height;
    let isPlaying = false;
    
    // Bauhaus colors
    const COLORS = {
      red: '#E53935',
      yellow: '#FDD835',
      blue: '#1E88E5',
      black: '#212121',
      cream: '#F5F5F0'
    };
    const colorList = [COLORS.red, COLORS.yellow, COLORS.blue, COLORS.black];
    
    // Grid system
    let elements = [];
    let cols, rows, cellSize;
    
    // Eno-inspired: prime-based intervals (in ms) that never sync
    // These create incommensurable loops
    const INTERVALS = {
      circle: [2300, 2900, 3700],       // Kick: slower, foundational
      triangle: [1700, 2100, 2300],     // Snare: mid-range
      square: [1300, 1700, 1900],       // Hat: faster, texture
      halfCircle: [3100, 3700, 4300]    // Blip: melodic, slower
    };
    
    // Pentatonic scale for melodic elements (always sounds good)
    const SCALE = ['C3', 'D3', 'E3', 'G3', 'A3', 'C4', 'D4', 'E4', 'G4', 'A4'];
    
    // Audio
    let kick, snare, hat, blip;
    let reverb, delay;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cellSize = Math.min(width, height) / 8;
      cols = Math.ceil(width / cellSize);
      rows = Math.ceil(height / cellSize);
    }
    
    function initAudio() {
      // Longer reverb for ambient feel
      reverb = new Tone.Reverb({ decay: 4, wet: 0.4 }).toDestination();
      delay = new Tone.FeedbackDelay({ delayTime: '4n', feedback: 0.3, wet: 0.2 }).connect(reverb);
      
      // Softer, rounder kick
      kick = new Tone.MembraneSynth({
        pitchDecay: 0.1,
        octaves: 4,
        oscillator: { type: 'sine' },
        envelope: { attack: 0.01, decay: 0.5, sustain: 0.01, release: 1 }
      }).connect(reverb);
      kick.volume.value = -10;
      
      // Softer snare
      snare = new Tone.NoiseSynth({
        noise: { type: 'pink' },
        envelope: { attack: 0.01, decay: 0.15, sustain: 0, release: 0.2 }
      }).connect(reverb);
      snare.volume.value = -16;
      
      // Gentler hat
      hat = new Tone.MetalSynth({
        frequency: 400,
        envelope: { attack: 0.001, decay: 0.05, release: 0.02 },
        harmonicity: 3,
        modulationIndex: 16,
        resonance: 2000,
        octaves: 0.5
      }).connect(delay);
      hat.volume.value = -24;
      
      // Warm melodic blip
      blip = new Tone.Synth({
        oscillator: { type: 'sine' },
        envelope: { attack: 0.05, decay: 0.3, sustain: 0.2, release: 0.8 }
      }).connect(delay);
      blip.volume.value = -14;
    }
    
    function generateElements() {
      elements = [];
      
      const types = ['circle', 'triangle', 'square', 'halfCircle'];
      const sizes = [0.5, 0.7, 0.9];
      const rotations = [0, Math.PI/2, Math.PI, Math.PI * 1.5];
      
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          // ~30% fill rate for more space
          if (Math.random() > 0.30) continue;
          
          const type = types[Math.floor(Math.random() * types.length)];
          const color = colorList[Math.floor(Math.random() * colorList.length)];
          
          // Pick a prime-based interval for this element
          const intervals = INTERVALS[type];
          const interval = intervals[Math.floor(Math.random() * intervals.length)];
          
          // Random phase offset so they don't all start together
          const phaseOffset = Math.random() * interval;
          
          elements.push({
            gridX: col,
            gridY: row,
            x: col * cellSize,
            y: row * cellSize,
            type,
            color,
            size: sizes[Math.floor(Math.random() * sizes.length)] * cellSize,
            rotation: rotations[Math.floor(Math.random() * rotations.length)],
            // Eno-style: each element has its own independent cycle
            interval,
            lastTrigger: performance.now() + phaseOffset,
            triggered: false,
            triggerTime: 0,
            // For melodic elements
            noteIndex: Math.floor(Math.random() * SCALE.length)
          });
        }
      }
    }
    
    function getPitch(color) {
      const offsets = {
        [COLORS.red]: 0,
        [COLORS.yellow]: 2,
        [COLORS.blue]: 4,
        [COLORS.black]: -2
      };
      return offsets[color] || 0;
    }
    
    function triggerElement(el) {
      const time = Tone.now();
      const velocity = 0.3 + (el.size / cellSize) * 0.3;
      
      switch(el.type) {
        case 'circle':
          const kickPitch = 35 + getPitch(el.color) * 3;
          kick.triggerAttackRelease(kickPitch, '2n', time, velocity);
          break;
        case 'triangle':
          snare.triggerAttackRelease('8n', time, velocity * 0.6);
          break;
        case 'square':
          hat.triggerAttackRelease('32n', time, velocity * 0.4);
          break;
        case 'halfCircle':
          const noteIdx = (el.noteIndex + getPitch(el.color)) % SCALE.length;
          const note = SCALE[Math.max(0, noteIdx)];
          blip.triggerAttackRelease(note, '4n', time, velocity * 0.7);
          break;
      }
      
      el.triggered = true;
      el.triggerTime = Date.now();
    }
    
    function update() {
      if (!isPlaying) return;
      
      const now = performance.now();
      
      for (const el of elements) {
        // Each element checks its own independent cycle
        if (now - el.lastTrigger >= el.interval) {
          triggerElement(el);
          el.lastTrigger = now;
        }
      }
    }
    
    function draw() {
      ctx.fillStyle = COLORS.cream;
      ctx.fillRect(0, 0, width, height);
      
      // Grid lines
      ctx.strokeStyle = 'rgba(200, 200, 195, 1)';
      ctx.lineWidth = 1;
      
      for (let x = 0; x <= width; x += cellSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y += cellSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      
      const now = Date.now();
      
      for (const el of elements) {
        ctx.save();
        ctx.translate(el.x + cellSize/2, el.y + cellSize/2);
        ctx.rotate(el.rotation);
        
        const timeSinceTrigger = now - el.triggerTime;
        const isTriggered = el.triggered && timeSinceTrigger < 200;
        const scale = isTriggered ? 1 + (1 - timeSinceTrigger / 200) * 0.12 : 1;
        
        if (el.triggered && timeSinceTrigger > 200) {
          el.triggered = false;
        }
        
        if (isTriggered) {
          ctx.shadowColor = el.color;
          ctx.shadowBlur = 30 * (1 - timeSinceTrigger / 200);
        }
        
        ctx.fillStyle = el.color;
        const s = el.size * scale;
        
        switch(el.type) {
          case 'circle':
            ctx.beginPath();
            ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
            ctx.fill();
            break;
          case 'square':
            ctx.fillRect(-s/2, -s/2, s, s);
            break;
          case 'triangle':
            ctx.beginPath();
            ctx.moveTo(0, -s/2);
            ctx.lineTo(-s/2, s/2);
            ctx.lineTo(s/2, s/2);
            ctx.closePath();
            ctx.fill();
            break;
          case 'halfCircle':
            ctx.beginPath();
            ctx.arc(0, 0, s/2, 0, Math.PI);
            ctx.fill();
            break;
        }
        
        ctx.restore();
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    async function start() {
      if (isPlaying) {
        generateElements();
        return;
      }
      
      await Tone.start();
      initAudio();
      generateElements();
      
      isPlaying = true;
      startBtn.classList.add('hidden');
    }
    
    startBtn.addEventListener('click', start);
    canvas.addEventListener('click', () => start());
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
    
    window.addEventListener('resize', () => {
      resize();
      if (elements.length) generateElements();
    });
    
    resize();
    generateElements();
    animate();
  </script>
</body>
</html>
