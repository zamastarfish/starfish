<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>bauhaus — beat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: #f5f5f0;
      touch-action: none;
    }
    canvas { display: block; }
    #back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(0,0,0,0.3);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 100;
      transition: color 0.3s;
    }
    #back:hover { color: rgba(0,0,0,0.7); }
    #start {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0,0,0,0.5);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      background: none;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 100;
    }
    #start:hover {
      color: rgba(0,0,0,0.8);
      border-color: rgba(0,0,0,0.4);
    }
    #start.hidden { display: none; }
  </style>
</head>
<body>
  <a id="back" href="/">← back</a>
  <button id="start">play</button>
  <canvas id="canvas"></canvas>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start');
    
    let width, height;
    let isPlaying = false;
    
    // Bauhaus colors
    const COLORS = {
      red: '#E53935',
      yellow: '#FDD835',
      blue: '#1E88E5',
      black: '#212121',
      cream: '#F5F5F0'
    };
    const colorKeys = ['red', 'yellow', 'blue', 'black'];
    
    // Elements - scattered across canvas
    let elements = [];
    
    // Polyrhythmic cycles (in 8th notes)
    const CYCLES = {
      circle: 8,      // Kick: every 4 beats (8 eighth notes)
      triangle: 6,    // Snare: every 3 beats
      square: 5,      // Hat: every 2.5 beats  
      halfCircle: 7   // Blip: every 3.5 beats
    };
    
    // Audio
    let kick, snare, hat, blip;
    let reverb;
    let stepCount = 0;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    function initAudio() {
      reverb = new Tone.Reverb({ decay: 2, wet: 0.25 }).toDestination();
      
      // Kick - warmer
      kick = new Tone.MembraneSynth({
        pitchDecay: 0.08,
        octaves: 5,
        oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 0.8 }
      }).connect(reverb);
      kick.volume.value = -8;
      
      // Snare - softer
      snare = new Tone.NoiseSynth({
        noise: { type: 'pink' },
        envelope: { attack: 0.005, decay: 0.12, sustain: 0, release: 0.1 }
      }).connect(reverb);
      snare.volume.value = -14;
      
      // Hat - gentler
      hat = new Tone.MetalSynth({
        frequency: 300,
        envelope: { attack: 0.001, decay: 0.04, release: 0.01 },
        harmonicity: 4,
        modulationIndex: 20,
        resonance: 3000,
        octaves: 1
      }).connect(reverb);
      hat.volume.value = -20;
      
      // Blip - melodic
      blip = new Tone.Synth({
        oscillator: { type: 'triangle' },
        envelope: { attack: 0.02, decay: 0.15, sustain: 0.1, release: 0.4 }
      }).connect(reverb);
      blip.volume.value = -12;
    }
    
    function generateElements() {
      elements = [];
      
      const cellSize = Math.min(width, height) / 8;
      const types = ['circle', 'square', 'triangle', 'halfCircle'];
      
      // Generate 15-25 elements scattered across canvas
      const count = 15 + Math.floor(Math.random() * 10);
      
      for (let i = 0; i < count; i++) {
        const type = types[Math.floor(Math.random() * types.length)];
        const color = colorKeys[Math.floor(Math.random() * colorKeys.length)];
        
        elements.push({
          x: Math.random() * width,
          y: Math.random() * height,
          type,
          color,
          size: (0.4 + Math.random() * 0.6) * cellSize,
          rotation: [0, Math.PI/2, Math.PI, Math.PI * 1.5][Math.floor(Math.random() * 4)],
          // Timing offset based on rotation (0-3 steps)
          offset: Math.floor(Math.random() * 4),
          triggered: false,
          triggerTime: 0
        });
      }
    }
    
    function getPitch(color, rotation) {
      // Base pitch from color
      const basePitches = {
        red: 0,      // root
        yellow: 4,   // major third
        blue: 7,     // fifth
        black: -5    // fourth below
      };
      
      // Rotation adds pitch offset
      const rotationOffset = Math.round(rotation / (Math.PI/2)) * 2;
      
      return basePitches[color] + rotationOffset;
    }
    
    function getNoteFromPitch(pitchOffset) {
      const notes = ['C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4'];
      const baseIndex = 4; // G3
      const index = Math.max(0, Math.min(notes.length - 1, baseIndex + pitchOffset));
      return notes[index];
    }
    
    function step() {
      const time = Tone.now();
      
      for (const el of elements) {
        const cycle = CYCLES[el.type];
        const effectiveStep = (stepCount + el.offset) % cycle;
        
        // Trigger on beat 0 of each element's cycle
        if (effectiveStep === 0) {
          el.triggered = true;
          el.triggerTime = Date.now();
          
          const velocity = 0.4 + (el.size / (Math.min(width, height) / 8)) * 0.4;
          const pitchOffset = getPitch(el.color, el.rotation);
          
          // Pan based on x position
          const pan = (el.x / width) * 2 - 1;
          
          switch(el.type) {
            case 'circle':
              kick.triggerAttackRelease(38 + pitchOffset * 2, '4n', time, velocity);
              break;
            case 'triangle':
              snare.triggerAttackRelease('8n', time, velocity * 0.7);
              break;
            case 'square':
              hat.triggerAttackRelease('16n', time, velocity * 0.5);
              break;
            case 'halfCircle':
              const note = getNoteFromPitch(pitchOffset);
              blip.triggerAttackRelease(note, '8n', time, velocity * 0.8);
              break;
          }
        }
      }
      
      stepCount++;
    }
    
    function draw() {
      ctx.fillStyle = COLORS.cream;
      ctx.fillRect(0, 0, width, height);
      
      // Subtle grid (like original)
      const gridSize = Math.min(width, height) / 8;
      ctx.strokeStyle = 'rgba(0,0,0,0.05)';
      ctx.lineWidth = 1;
      
      for (let x = 0; x <= width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      
      // Draw elements
      const now = Date.now();
      
      for (const el of elements) {
        ctx.save();
        ctx.translate(el.x, el.y);
        ctx.rotate(el.rotation);
        
        // Trigger animation
        const timeSinceTrigger = now - el.triggerTime;
        const triggerScale = el.triggered && timeSinceTrigger < 150 
          ? 1 + (1 - timeSinceTrigger / 150) * 0.2 
          : 1;
        
        if (el.triggered && timeSinceTrigger > 150) {
          el.triggered = false;
        }
        
        // Glow when triggered
        if (el.triggered) {
          ctx.shadowColor = COLORS[el.color];
          ctx.shadowBlur = 30 * (1 - timeSinceTrigger / 150);
        }
        
        ctx.fillStyle = COLORS[el.color];
        const s = el.size * triggerScale;
        
        switch(el.type) {
          case 'circle':
            ctx.beginPath();
            ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
            ctx.fill();
            break;
          case 'square':
            ctx.fillRect(-s/2, -s/2, s, s);
            break;
          case 'triangle':
            ctx.beginPath();
            ctx.moveTo(0, -s/2);
            ctx.lineTo(-s/2, s/2);
            ctx.lineTo(s/2, s/2);
            ctx.closePath();
            ctx.fill();
            break;
          case 'halfCircle':
            ctx.beginPath();
            ctx.arc(0, 0, s/2, 0, Math.PI);
            ctx.fill();
            break;
        }
        
        ctx.restore();
      }
    }
    
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    let loop;
    
    async function start() {
      if (isPlaying) {
        // Click to regenerate when playing
        generateElements();
        return;
      }
      
      await Tone.start();
      initAudio();
      generateElements();
      
      isPlaying = true;
      startBtn.classList.add('hidden');
      
      Tone.Transport.bpm.value = 110;
      
      loop = new Tone.Loop((time) => {
        Tone.Draw.schedule(() => {
          step();
        }, time);
      }, '8n').start(0);
      
      Tone.Transport.start();
    }
    
    // Events
    startBtn.addEventListener('click', start);
    
    canvas.addEventListener('click', () => {
      start(); // Start or regenerate
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      start();
    });
    
    window.addEventListener('resize', () => {
      resize();
      if (isPlaying) generateElements();
    });
    
    resize();
    generateElements();
    animate();
  </script>
</body>
</html>
