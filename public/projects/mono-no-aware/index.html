<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物の哀れ — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to bottom, #1a1520, #0d0a0f);
      overflow: hidden; 
      font-family: 'Georgia', serif;
    }
    canvas { display: block; }
    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 200, 210, 0.15);
      font-size: 72px;
      font-weight: 300;
      letter-spacing: 8px;
      pointer-events: none;
      writing-mode: vertical-rl;
      text-orientation: upright;
    }
    #whisper {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 200, 210, 0.3);
      font-size: 12px;
      font-style: italic;
      pointer-events: none;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="title">哀</div>
  <div id="whisper">beauty is brief — that's what makes it beautiful</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    
    // Petals
    const petals = [];
    const maxPetals = 150;
    
    // Branch (implied, off-screen source)
    const sources = [];
    
    // Wind
    let windX = 0;
    let windY = 0;
    let targetWindX = 0;
    let targetWindY = 0;
    
    // Accumulated petals on ground
    const groundPetals = [];
    const maxGroundPetals = 100;
    
    // Seasonal progression (very slow)
    let season = 0; // 0 = full bloom, 1 = all fallen
    const seasonSpeed = 0.00002;
    
    // Petal colors - soft pinks, some white
    const petalColors = [
      { r: 255, g: 220, b: 230 },
      { r: 255, g: 200, b: 215 },
      { r: 255, g: 235, b: 240 },
      { r: 250, g: 210, b: 220 },
      { r: 255, g: 225, b: 235 },
      { r: 248, g: 200, b: 210 },
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      // Create source points (branches, off-screen or at top)
      sources.length = 0;
      for (let i = 0; i < 5; i++) {
        sources.push({
          x: Math.random() * width,
          y: -20 - Math.random() * 50
        });
      }
    }
    
    class Petal {
      constructor(x, y) {
        this.x = x || sources[Math.floor(Math.random() * sources.length)].x + (Math.random() - 0.5) * 100;
        this.y = y || -10 - Math.random() * 30;
        this.size = 4 + Math.random() * 6;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.03;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = 0.3 + Math.random() * 0.5;
        this.flutter = Math.random() * Math.PI * 2;
        this.flutterSpeed = 0.02 + Math.random() * 0.02;
        this.flutterAmp = 0.5 + Math.random() * 1;
        this.color = petalColors[Math.floor(Math.random() * petalColors.length)];
        this.alpha = 0.7 + Math.random() * 0.3;
        this.fallen = false;
        this.fadeOut = 1;
      }
      
      update() {
        if (this.fallen) {
          this.fadeOut -= 0.001;
          return this.fadeOut > 0;
        }
        
        // Flutter
        this.flutter += this.flutterSpeed;
        const flutterX = Math.sin(this.flutter) * this.flutterAmp;
        
        // Apply wind and gravity
        this.vx += (windX * 0.01 + flutterX * 0.01);
        this.vy += 0.01; // gentle gravity
        
        // Damping
        this.vx *= 0.99;
        this.vy *= 0.99;
        
        // Terminal velocity
        this.vy = Math.min(this.vy, 2);
        
        this.x += this.vx + flutterX * 0.3;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;
        
        // Ground collision
        if (this.y > height - 30 - Math.random() * 20) {
          this.fallen = true;
          this.y = height - 10 - Math.random() * 30;
          this.rotation = Math.random() * Math.PI * 2;
          
          // Add to ground pile
          if (groundPetals.length < maxGroundPetals) {
            groundPetals.push({
              x: this.x,
              y: this.y,
              size: this.size * 0.8,
              rotation: this.rotation,
              color: this.color,
              alpha: this.alpha * 0.6
            });
          }
        }
        
        // Off screen
        if (this.x < -50 || this.x > width + 50) {
          return false;
        }
        
        return true;
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        const alpha = this.alpha * this.fadeOut;
        
        // Petal shape - soft oval with slight point
        ctx.beginPath();
        ctx.moveTo(0, -this.size);
        ctx.bezierCurveTo(
          this.size * 0.8, -this.size * 0.5,
          this.size * 0.8, this.size * 0.5,
          0, this.size * 0.7
        );
        ctx.bezierCurveTo(
          -this.size * 0.8, this.size * 0.5,
          -this.size * 0.8, -this.size * 0.5,
          0, -this.size
        );
        
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
        gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
        gradient.addColorStop(1, `rgba(${this.color.r - 20}, ${this.color.g - 20}, ${this.color.b - 10}, ${alpha * 0.5})`);
        
        ctx.fillStyle = gradient;
        ctx.fill();
        
        ctx.restore();
      }
    }
    
    function spawnPetal() {
      // Spawn rate decreases as season progresses
      const spawnChance = 0.03 * (1 - season * 0.8);
      if (Math.random() < spawnChance && petals.length < maxPetals) {
        petals.push(new Petal());
      }
    }
    
    function updateWind() {
      // Gentle, drifting wind changes
      if (Math.random() < 0.01) {
        targetWindX = (Math.random() - 0.5) * 3;
        targetWindY = (Math.random() - 0.3) * 0.5;
      }
      windX += (targetWindX - windX) * 0.01;
      windY += (targetWindY - windY) * 0.01;
    }
    
    function drawGroundPetals() {
      for (let p of groundPetals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, ${p.alpha})`;
        ctx.fill();
        
        ctx.restore();
      }
    }
    
    function draw() {
      // Soft fade
      ctx.fillStyle = 'rgba(13, 10, 15, 0.03)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw ground accumulation
      drawGroundPetals();
      
      // Draw falling petals
      for (let petal of petals) {
        petal.draw();
      }
    }
    
    function update() {
      updateWind();
      spawnPetal();
      
      // Season progresses
      season = Math.min(1, season + seasonSpeed);
      
      // Update petals
      for (let i = petals.length - 1; i >= 0; i--) {
        if (!petals[i].update()) {
          petals.splice(i, 1);
        }
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Mouse creates gentle wind
    let lastMouseX = 0;
    let lastMouseY = 0;
    
    canvas.addEventListener('mousemove', (e) => {
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      targetWindX += dx * 0.05;
      targetWindY += dy * 0.02;
      targetWindX = Math.max(-5, Math.min(5, targetWindX));
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    
    // Touch creates wind
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const dx = touch.clientX - lastMouseX;
      const dy = touch.clientY - lastMouseY;
      targetWindX += dx * 0.1;
      targetWindY += dy * 0.05;
      targetWindX = Math.max(-5, Math.min(5, targetWindX));
      lastMouseX = touch.clientX;
      lastMouseY = touch.clientY;
    });
    
    // Click spawns a burst of petals (a gust)
    canvas.addEventListener('click', (e) => {
      for (let i = 0; i < 10; i++) {
        petals.push(new Petal(
          e.clientX + (Math.random() - 0.5) * 50,
          e.clientY - 20 + (Math.random() - 0.5) * 30
        ));
      }
    });
    
    window.addEventListener('resize', resize);
    
    resize();
    animate();
  </script>
</body>
</html>
