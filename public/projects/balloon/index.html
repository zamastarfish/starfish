<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>balloon — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to bottom, #87CEEB, #E0F4FF);
      overflow: hidden; 
      font-family: Georgia, serif;
      min-height: 100vh;
    }
    canvas { display: block; }
    
    .nav-btn {
      position: fixed;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(100, 130, 180, 0.3);
      background: rgba(255, 255, 255, 0.5);
      color: rgba(60, 100, 140, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .nav-btn:hover {
      border-color: rgba(100, 130, 180, 0.6);
      color: rgba(60, 100, 140, 0.95);
      background: rgba(255, 255, 255, 0.8);
    }
    #homeBtn { left: 20px; }
    #infoBtn { right: 20px; }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(100, 130, 180, 0.2);
      border-radius: 8px;
      padding: 20px;
      color: rgba(40, 70, 110, 0.9);
      font-size: 14px;
      line-height: 1.6;
      display: none;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    #info h3 {
      color: rgba(40, 80, 130, 0.95);
      margin-bottom: 10px;
      font-weight: normal;
      font-style: italic;
    }
    #info p { margin-bottom: 8px; }
    #info .close {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
      color: rgba(100, 130, 180, 0.5);
    }
    
    #start-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(80, 120, 160, 0.6);
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.5px;
      z-index: 50;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    
    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(80, 120, 160, 0.5);
      font-size: 12px;
      font-style: italic;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <button id="homeBtn" class="nav-btn" title="Back to gallery">←</button>
  <button id="infoBtn" class="nav-btn" title="About this piece">?</button>
  
  <div id="info">
    <span class="close">×</span>
    <h3>balloon</h3>
    <p>Someone let go. Now it drifts — helium slowly escaping through the latex, 
    the boundary between rising and falling.</p>
    <p>Move to create air currents. Watch it find equilibrium. Wait for the descent.</p>
    <p>Click to release a new balloon.</p>
    <p><em>Everything that rises must converge.</em></p>
  </div>
  
  <div id="start-prompt">click to release</div>
  <div id="status"></div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    
    let width, height;
    let audioStarted = false;
    let audioCtx, masterGain;
    
    // Mouse for wind
    let mouseX = -1000, mouseY = -1000;
    let lastMouseX = -1000, lastMouseY = -1000;
    let mouseVelX = 0, mouseVelY = 0;
    
    // Balloons
    let balloons = [];
    
    // Clouds (background)
    let clouds = [];
    
    const colors = [
      { h: 0, s: 70, l: 55 },    // Red
      { h: 200, s: 70, l: 50 },  // Blue
      { h: 45, s: 80, l: 55 },   // Yellow
      { h: 280, s: 60, l: 55 },  // Purple
      { h: 140, s: 50, l: 45 },  // Green
      { h: 25, s: 80, l: 55 },   // Orange
      { h: 330, s: 65, l: 60 },  // Pink
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      // Generate clouds
      clouds = [];
      for (let i = 0; i < 5; i++) {
        clouds.push({
          x: Math.random() * width,
          y: 50 + Math.random() * height * 0.4,
          size: 60 + Math.random() * 100,
          speed: 0.1 + Math.random() * 0.2
        });
      }
      
      if (balloons.length === 0) {
        spawnBalloon(width / 2, height * 0.6);
      }
    }
    
    function spawnBalloon(x, y) {
      const color = colors[Math.floor(Math.random() * colors.length)];
      balloons.push({
        x: x,
        y: y,
        vx: 0,
        vy: 0,
        radius: 35 + Math.random() * 15,
        color: color,
        helium: 1.0, // 1.0 = full, 0 = empty
        stringLength: 80 + Math.random() * 40,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.02,
        age: 0
      });
    }
    
    function updateBalloon(b, dt) {
      b.age += dt;
      b.wobble += b.wobbleSpeed;
      
      // Helium slowly escapes
      b.helium -= 0.00002 * dt;
      b.helium = Math.max(0, b.helium);
      
      // Buoyancy based on helium level
      // At helium=1: strong upward force
      // At helium=0.5: neutral
      // At helium=0: sinks
      const buoyancy = (b.helium - 0.4) * 0.015;
      
      // Apply forces
      b.vy -= buoyancy * dt; // Buoyancy (negative = up)
      b.vy += 0.003 * dt;     // Gravity (weak, balloon is light)
      
      // Air resistance
      b.vx *= 0.995;
      b.vy *= 0.995;
      
      // Wind from mouse movement
      const dx = b.x - mouseX;
      const dy = b.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 200 && dist > 0) {
        const force = (1 - dist / 200) * 0.3;
        b.vx += mouseVelX * force * 0.1;
        b.vy += mouseVelY * force * 0.1;
      }
      
      // Random drift
      b.vx += (Math.random() - 0.5) * 0.01;
      
      // Update position
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      
      // Soft boundaries
      if (b.x < b.radius) {
        b.x = b.radius;
        b.vx *= -0.5;
      }
      if (b.x > width - b.radius) {
        b.x = width - b.radius;
        b.vx *= -0.5;
      }
      
      // Top boundary (can go off screen)
      if (b.y < -b.radius - b.stringLength) {
        // Balloon escaped
        return false;
      }
      
      // Bottom boundary
      if (b.y > height - 20) {
        b.y = height - 20;
        b.vy *= -0.3;
      }
      
      return true;
    }
    
    function drawBalloon(b) {
      const time = Date.now() * 0.001;
      const wobbleX = Math.sin(b.wobble) * 3;
      const wobbleY = Math.cos(b.wobble * 0.7) * 2;
      
      const x = b.x + wobbleX;
      const y = b.y + wobbleY;
      
      ctx.save();
      
      // String (curves based on movement)
      const stringEndX = x + b.vx * 10;
      const stringEndY = y + b.stringLength;
      
      ctx.strokeStyle = 'rgba(100, 100, 100, 0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y + b.radius * 0.9);
      ctx.quadraticCurveTo(
        x + b.vx * 20, 
        y + b.stringLength * 0.5,
        stringEndX,
        Math.min(stringEndY, height - 5)
      );
      ctx.stroke();
      
      // Balloon shadow (subtle)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.beginPath();
      ctx.ellipse(x + 10, y + 10, b.radius * 0.9, b.radius * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Balloon body
      const deflation = 1 - (1 - b.helium) * 0.3; // Slight deflation as helium escapes
      const rx = b.radius * deflation;
      const ry = b.radius * 1.2 * deflation;
      
      // Gradient for 3D effect
      const gradient = ctx.createRadialGradient(
        x - rx * 0.3, y - ry * 0.3, 0,
        x, y, ry
      );
      
      const baseColor = `hsl(${b.color.h}, ${b.color.s}%, ${b.color.l}%)`;
      const lightColor = `hsl(${b.color.h}, ${b.color.s - 10}%, ${Math.min(85, b.color.l + 25)}%)`;
      const darkColor = `hsl(${b.color.h}, ${b.color.s + 10}%, ${b.color.l - 15}%)`;
      
      gradient.addColorStop(0, lightColor);
      gradient.addColorStop(0.5, baseColor);
      gradient.addColorStop(1, darkColor);
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.ellipse(x - rx * 0.35, y - ry * 0.35, rx * 0.25, ry * 0.2, -0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Knot at bottom
      ctx.fillStyle = darkColor;
      ctx.beginPath();
      ctx.moveTo(x - 4, y + ry * 0.85);
      ctx.lineTo(x, y + ry + 8);
      ctx.lineTo(x + 4, y + ry * 0.85);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }
    
    function updateClouds(dt) {
      clouds.forEach(c => {
        c.x += c.speed * dt * 0.1;
        if (c.x > width + c.size) {
          c.x = -c.size;
        }
      });
    }
    
    function drawClouds() {
      clouds.forEach(c => {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        
        // Cloud made of overlapping circles
        const puffs = [
          { dx: 0, dy: 0, r: c.size * 0.5 },
          { dx: -c.size * 0.35, dy: c.size * 0.1, r: c.size * 0.35 },
          { dx: c.size * 0.35, dy: c.size * 0.05, r: c.size * 0.4 },
          { dx: -c.size * 0.15, dy: -c.size * 0.2, r: c.size * 0.3 },
          { dx: c.size * 0.2, dy: -c.size * 0.15, r: c.size * 0.35 },
        ];
        
        puffs.forEach(p => {
          ctx.beginPath();
          ctx.arc(c.x + p.dx, c.y + p.dy, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
      });
    }
    
    function draw() {
      const dt = 16;
      
      // Update mouse velocity
      if (mouseX > 0) {
        mouseVelX = mouseX - lastMouseX;
        mouseVelY = mouseY - lastMouseY;
        lastMouseX = mouseX;
        lastMouseY = mouseY;
      }
      
      // Clear with sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
      skyGrad.addColorStop(0, '#6BB3E0');
      skyGrad.addColorStop(0.5, '#9ED2F0');
      skyGrad.addColorStop(1, '#D4ECFA');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, width, height);
      
      updateClouds(dt);
      drawClouds();
      
      // Ground hint at bottom
      ctx.fillStyle = 'rgba(100, 160, 100, 0.2)';
      ctx.fillRect(0, height - 20, width, 20);
      
      // Update and draw balloons
      balloons = balloons.filter(b => updateBalloon(b, dt));
      balloons.forEach(b => drawBalloon(b));
      
      // Status
      if (balloons.length === 0) {
        status.textContent = 'gone...';
        status.style.opacity = '1';
      } else {
        const b = balloons[0];
        if (b.helium < 0.3) {
          status.textContent = 'sinking...';
          status.style.opacity = '0.6';
        } else if (b.helium < 0.5) {
          status.textContent = 'equilibrium';
          status.style.opacity = '0.5';
        } else if (b.y < 50) {
          status.textContent = 'rising...';
          status.style.opacity = '0.5';
        } else {
          status.style.opacity = '0';
        }
      }
      
      requestAnimationFrame(draw);
    }
    
    // Audio
    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      document.getElementById('start-prompt').style.opacity = '0';
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.3;
      masterGain.connect(audioCtx.destination);
      
      startAmbient();
    }
    
    function startAmbient() {
      // Light breeze - filtered noise
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 400;
      filter.Q.value = 0.5;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.08;
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      noise.start();
      
      // Occasional subtle rubber creak
      setInterval(() => {
        if (balloons.length > 0 && Math.random() < 0.15) {
          playCreak();
        }
      }, 2000);
    }
    
    function playCreak() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      // High pitch squeak
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800 + Math.random() * 400, now);
      osc.frequency.linearRampToValueAtTime(600 + Math.random() * 200, now + 0.1);
      
      gain.gain.setValueAtTime(0.02, now);
      gain.gain.linearRampToValueAtTime(0.04, now + 0.05);
      gain.gain.linearRampToValueAtTime(0, now + 0.15);
      
      osc.connect(gain);
      gain.connect(masterGain);
      
      osc.start(now);
      osc.stop(now + 0.15);
    }
    
    function playPop() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      // Noise burst
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.05));
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.3;
      
      source.connect(gain);
      gain.connect(masterGain);
      
      source.start(now);
    }
    
    // Events
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    });
    
    canvas.addEventListener('mouseleave', () => {
      mouseX = -1000;
      mouseY = -1000;
    });
    
    canvas.addEventListener('click', (e) => {
      initAudio();
      spawnBalloon(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      initAudio();
    });
    
    // Navigation
    document.getElementById('homeBtn').onclick = () => {
      window.location.href = '/';
    };
    
    document.getElementById('infoBtn').onclick = () => {
      document.getElementById('info').style.display = 'block';
    };
    
    document.querySelector('#info .close').onclick = () => {
      document.getElementById('info').style.display = 'none';
    };
    
    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
