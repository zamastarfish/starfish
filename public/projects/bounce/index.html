<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>bounce — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0f0f1a; 
      overflow: hidden; 
      touch-action: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    canvas { display: block; }
    
    .info-btn, .nav-btn {
      position: fixed;
      bottom: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .info-btn { right: 20px; }
    .nav-btn { right: 66px; font-size: 14px; }
    .info-btn:hover, .nav-btn:hover {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }
    
    .info-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 280px;
      background: rgba(15, 15, 26, 0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      line-height: 1.6;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 99;
      backdrop-filter: blur(20px);
    }
    .info-panel.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .info-panel h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.95);
      font-weight: 500;
    }
    .info-panel p { margin-bottom: 10px; }
    .info-panel .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 26, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      backdrop-filter: blur(20px);
    }
    .start-overlay.hidden { display: none; }
    .start-content {
      text-align: center;
      color: rgba(255,255,255,0.8);
    }
    .start-content h1 {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }
    .start-content p {
      font-size: 16px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1>bounce</h1>
      <p>tap to play</p>
    </div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <button class="nav-btn" onclick="window.location.href='/'">←</button>
  <button class="info-btn" id="infoBtn">?</button>
  
  <div class="info-panel" id="infoPanel">
    <h3>bounce</h3>
    <p>Balls fall, bounce, make sounds. Simple physics, simple joy.</p>
    <p>Click to drop more. Drag to throw them. The pitch follows the position.</p>
    <p class="hint">Press R to reset. Press G to toggle gravity direction.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let balls = [];
    let audioStarted = false;
    let gravity = 0.4;
    let gravityDir = 1;
    
    // Bright, playful colors
    const colors = [
      '#ff6b6b', // coral red
      '#ffd93d', // sunny yellow
      '#6bcb77', // fresh green
      '#4d96ff', // sky blue
      '#c77dff', // soft purple
      '#ff8fab', // pink
      '#00d9ff', // cyan
      '#ff9f45', // orange
    ];
    
    // Audio
    let synth, reverb;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Ball {
      constructor(x, y, vx = 0, vy = 0) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = 15 + Math.random() * 25;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.restitution = 0.7 + Math.random() * 0.2;
        this.lastBounce = 0;
      }
      
      update() {
        // Gravity
        this.vy += gravity * gravityDir;
        
        // Air resistance
        this.vx *= 0.999;
        this.vy *= 0.999;
        
        // Move
        this.x += this.vx;
        this.y += this.vy;
        
        // Bounce off walls
        if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx = -this.vx * this.restitution;
          this.playBounce('wall');
        }
        if (this.x + this.radius > width) {
          this.x = width - this.radius;
          this.vx = -this.vx * this.restitution;
          this.playBounce('wall');
        }
        
        // Bounce off floor/ceiling
        if (gravityDir > 0 && this.y + this.radius > height) {
          this.y = height - this.radius;
          this.vy = -this.vy * this.restitution;
          this.playBounce('floor');
        }
        if (gravityDir < 0 && this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = -this.vy * this.restitution;
          this.playBounce('floor');
        }
        
        // Ceiling/floor for opposite direction
        if (gravityDir > 0 && this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = -this.vy * this.restitution;
        }
        if (gravityDir < 0 && this.y + this.radius > height) {
          this.y = height - this.radius;
          this.vy = -this.vy * this.restitution;
        }
      }
      
      playBounce(type) {
        if (!audioStarted) return;
        const now = Date.now();
        if (now - this.lastBounce < 50) return;
        this.lastBounce = now;
        
        const velocity = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (velocity < 2) return;
        
        // Map position to pitch
        const pitchIndex = Math.floor((this.x / width) * 12);
        const octave = Math.floor((1 - this.y / height) * 2) + 3;
        const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C', 'D', 'E', 'F', 'G'];
        const note = notes[pitchIndex % 12] + octave;
        
        // Volume based on velocity
        const volume = Math.min(velocity / 20, 1) * 0.5;
        
        synth.triggerAttackRelease(note, '16n', Tone.now(), volume);
      }
      
      draw() {
        // Glow
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.radius * 1.5
        );
        gradient.addColorStop(0, this.color + '80');
        gradient.addColorStop(0.5, this.color + '20');
        gradient.addColorStop(1, 'transparent');
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // Ball
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // Highlight
        ctx.beginPath();
        ctx.arc(
          this.x - this.radius * 0.3,
          this.y - this.radius * 0.3,
          this.radius * 0.3,
          0, Math.PI * 2
        );
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();
      }
    }
    
    function checkCollisions() {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.radius + b.radius;
          
          if (dist < minDist) {
            // Collision response
            const nx = dx / dist;
            const ny = dy / dist;
            
            const relVx = a.vx - b.vx;
            const relVy = a.vy - b.vy;
            const relVn = relVx * nx + relVy * ny;
            
            if (relVn > 0) continue;
            
            const restitution = Math.min(a.restitution, b.restitution);
            const impulse = -(1 + restitution) * relVn / 2;
            
            a.vx += impulse * nx;
            a.vy += impulse * ny;
            b.vx -= impulse * nx;
            b.vy -= impulse * ny;
            
            // Separate
            const overlap = minDist - dist;
            a.x -= overlap * nx * 0.5;
            a.y -= overlap * ny * 0.5;
            b.x += overlap * nx * 0.5;
            b.y += overlap * ny * 0.5;
            
            // Sound
            const velocity = Math.abs(relVn);
            if (velocity > 3) {
              a.playBounce('collision');
            }
          }
        }
      }
    }
    
    function initAudio() {
      reverb = new Tone.Reverb({ decay: 2, wet: 0.3 }).toDestination();
      
      synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: {
          attack: 0.005,
          decay: 0.2,
          sustain: 0.1,
          release: 0.4
        }
      });
      
      const gain = new Tone.Gain(0.6).connect(reverb);
      synth.connect(gain);
    }
    
    async function startAudio() {
      if (audioStarted) return;
      await Tone.start();
      initAudio();
      audioStarted = true;
    }
    
    function spawnBall(x, y, vx = 0, vy = 0) {
      if (balls.length < 50) {
        balls.push(new Ball(x, y, vx, vy));
      }
    }
    
    function update() {
      for (const ball of balls) {
        ball.update();
      }
      checkCollisions();
    }
    
    function draw() {
      // Fade
      ctx.fillStyle = 'rgba(15, 15, 26, 0.2)';
      ctx.fillRect(0, 0, width, height);
      
      for (const ball of balls) {
        ball.draw();
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Interaction
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let dragCurrent = { x: 0, y: 0 };
    
    function getPos(e) {
      if (e.touches) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }
    
    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      dragStart = getPos(e);
      dragCurrent = dragStart;
    });
    
    canvas.addEventListener('mousemove', e => {
      if (isDragging) {
        dragCurrent = getPos(e);
      }
    });
    
    canvas.addEventListener('mouseup', e => {
      if (isDragging) {
        const pos = getPos(e);
        const vx = (dragStart.x - pos.x) * 0.1;
        const vy = (dragStart.y - pos.y) * 0.1;
        spawnBall(dragStart.x, dragStart.y, vx, vy);
      }
      isDragging = false;
    });
    
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      isDragging = true;
      dragStart = getPos(e);
      dragCurrent = dragStart;
    });
    
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (isDragging) {
        dragCurrent = getPos(e);
      }
    });
    
    canvas.addEventListener('touchend', e => {
      if (isDragging && e.changedTouches.length > 0) {
        const pos = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        const vx = (dragStart.x - pos.x) * 0.1;
        const vy = (dragStart.y - pos.y) * 0.1;
        spawnBall(dragStart.x, dragStart.y, vx, vy);
      }
      isDragging = false;
    });
    
    // Draw drag line
    function drawDragLine() {
      if (isDragging) {
        ctx.beginPath();
        ctx.moveTo(dragStart.x, dragStart.y);
        ctx.lineTo(dragCurrent.x, dragCurrent.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Preview ball
        ctx.beginPath();
        ctx.arc(dragStart.x, dragStart.y, 20, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.stroke();
      }
    }
    
    // Override draw to include drag line
    const originalDraw = draw;
    draw = function() {
      originalDraw();
      drawDragLine();
    };
    
    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'r' || e.key === 'R') {
        balls = [];
      }
      if (e.key === 'g' || e.key === 'G') {
        gravityDir *= -1;
      }
    });
    
    // Info panel
    const infoBtn = document.getElementById('infoBtn');
    const infoPanel = document.getElementById('infoPanel');
    infoBtn.addEventListener('click', () => {
      infoPanel.classList.toggle('visible');
    });
    
    // Start
    const startOverlay = document.getElementById('startOverlay');
    startOverlay.addEventListener('click', async () => {
      await startAudio();
      startOverlay.classList.add('hidden');
      
      // Initial balls
      for (let i = 0; i < 5; i++) {
        spawnBall(
          width * 0.3 + Math.random() * width * 0.4,
          height * 0.1 + Math.random() * height * 0.2,
          (Math.random() - 0.5) * 5,
          Math.random() * 2
        );
      }
    });
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
