<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jellyfish — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #020510; 
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    canvas { display: block; }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      max-width: 280px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.5s;
    }
    
    #info.visible { opacity: 1; }
    
    .nav-btn {
      position: fixed;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }
    
    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
    }
    
    #home-btn { left: 20px; }
    #info-btn { right: 20px; }
  </style>
</head>
<body>
  <button class="nav-btn" id="home-btn" title="Back to gallery">←</button>
  <button class="nav-btn" id="info-btn" title="About this piece">?</button>
  
  <div id="info">
    <strong>jellyfish</strong><br><br>
    Drifting through the deep. No brain, no blood, no bones — 
    just pulse and drift, for 500 million years.<br><br>
    Click to spawn. Move to create currents.<br><br>
    <em>95% water, 100% alive.</em>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    // Navigation
    document.getElementById('home-btn').onclick = () => window.location.href = '/';
    document.getElementById('info-btn').onclick = () => {
      document.getElementById('info').classList.toggle('visible');
    };
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let jellyfish = [];
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let lastMouseX = 0, lastMouseY = 0;
    let audioStarted = false;
    let audioCtx, masterGain, droneOsc, droneGain;
    
    const MAX_JELLYFISH = 8;
    const COLORS = [
      { h: 280, s: 70, l: 60 }, // Purple
      { h: 200, s: 80, l: 55 }, // Blue
      { h: 320, s: 60, l: 65 }, // Pink
      { h: 170, s: 70, l: 50 }, // Teal
      { h: 40, s: 70, l: 60 },  // Gold
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Jellyfish {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -0.3 - Math.random() * 0.3;
        
        this.size = 30 + Math.random() * 40;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.03 + Math.random() * 0.02;
        
        const colorIndex = Math.floor(Math.random() * COLORS.length);
        this.color = { ...COLORS[colorIndex] };
        
        // Tentacle parameters
        this.tentacleCount = 8 + Math.floor(Math.random() * 6);
        this.tentacles = [];
        for (let i = 0; i < this.tentacleCount; i++) {
          this.tentacles.push({
            angle: (i / this.tentacleCount) * Math.PI * 0.8 + Math.PI * 0.1,
            length: this.size * (1.5 + Math.random() * 1.5),
            phase: Math.random() * Math.PI * 2,
            speed: 0.02 + Math.random() * 0.02
          });
        }
      }
      
      update(mouseVx, mouseVy) {
        // Pulse animation
        this.pulsePhase += this.pulseSpeed;
        const pulse = Math.sin(this.pulsePhase);
        
        // Propulsion on pulse contraction
        if (pulse < -0.9 && Math.sin(this.pulsePhase - this.pulseSpeed) >= -0.9) {
          this.vy -= 0.8;
          playPulse(this.x, this.y, this.size);
        }
        
        // Mouse current influence
        const dx = this.x - mouseX;
        const dy = this.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          const force = (1 - dist / 200) * 0.3;
          this.vx += mouseVx * force;
          this.vy += mouseVy * force;
        }
        
        // Gentle upward drift
        this.vy -= 0.01;
        
        // Damping
        this.vx *= 0.98;
        this.vy *= 0.98;
        
        // Update position
        this.x += this.vx;
        this.y += this.vy;
        
        // Wrap around
        if (this.y < -this.size * 3) this.y = height + this.size * 2;
        if (this.y > height + this.size * 3) this.y = -this.size * 2;
        if (this.x < -this.size * 2) this.x = width + this.size;
        if (this.x > width + this.size * 2) this.x = -this.size;
        
        // Update tentacles
        for (const t of this.tentacles) {
          t.phase += t.speed;
        }
        
        // Spawn particles occasionally
        if (Math.random() < 0.05) {
          particles.push({
            x: this.x + (Math.random() - 0.5) * this.size,
            y: this.y + this.size * 0.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: Math.random() * 0.2,
            life: 1,
            color: this.color
          });
        }
      }
      
      draw() {
        const pulse = Math.sin(this.pulsePhase);
        const bellWidth = this.size * (0.8 + pulse * 0.2);
        const bellHeight = this.size * (0.6 - pulse * 0.15);
        
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Glow
        const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 2);
        glowGradient.addColorStop(0, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.3)`);
        glowGradient.addColorStop(0.5, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.1)`);
        glowGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGradient;
        ctx.beginPath();
        ctx.arc(0, 0, this.size * 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Tentacles (draw first, behind bell)
        for (const t of this.tentacles) {
          const startX = Math.cos(t.angle - Math.PI / 2) * bellWidth * 0.7;
          const startY = bellHeight * 0.3;
          
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          
          // Draw wavy tentacle with bezier curves
          const segments = 4;
          let px = startX, py = startY;
          
          for (let i = 0; i < segments; i++) {
            const segLen = t.length / segments;
            const wave = Math.sin(t.phase + i * 0.8) * (10 + i * 3);
            const nextY = py + segLen;
            const nextX = px + wave;
            
            const cpX = px + wave * 0.5;
            const cpY = py + segLen * 0.5;
            
            ctx.quadraticCurveTo(cpX, cpY, nextX, nextY);
            px = nextX;
            py = nextY;
          }
          
          ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${0.4 - pulse * 0.1})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        
        // Bell (dome)
        ctx.beginPath();
        ctx.ellipse(0, 0, bellWidth, bellHeight, 0, Math.PI, 0);
        
        // Bell gradient
        const bellGradient = ctx.createRadialGradient(0, -bellHeight * 0.3, 0, 0, 0, bellHeight);
        bellGradient.addColorStop(0, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l + 20}%, 0.6)`);
        bellGradient.addColorStop(0.5, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.4)`);
        bellGradient.addColorStop(1, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l - 10}%, 0.3)`);
        
        ctx.fillStyle = bellGradient;
        ctx.fill();
        
        // Bell edge
        ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l + 10}%, 0.5)`;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Inner bell detail
        ctx.beginPath();
        ctx.ellipse(0, bellHeight * 0.1, bellWidth * 0.6, bellHeight * 0.5, 0, Math.PI, 0);
        ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l + 15}%, 0.3)`;
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Frilly edge
        const frillyCount = 20;
        ctx.beginPath();
        for (let i = 0; i <= frillyCount; i++) {
          const angle = Math.PI + (i / frillyCount) * Math.PI;
          const frillPulse = Math.sin(this.pulsePhase * 2 + i * 0.5) * 3;
          const r = bellWidth + frillPulse;
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * bellHeight * 0.2 + bellHeight * 0.05;
          
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l + 20}%, 0.6)`;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.restore();
      }
    }
    
    function init() {
      resize();
      jellyfish = [];
      particles = [];
      
      // Start with a few jellyfish
      for (let i = 0; i < 4; i++) {
        jellyfish.push(new Jellyfish(
          Math.random() * width,
          Math.random() * height
        ));
      }
    }
    
    // Audio
    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.25;
      masterGain.connect(audioCtx.destination);
      
      // Deep ocean drone
      const droneFreqs = [55, 82.5, 110, 165]; // A1, E2, A2, E3
      droneFreqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sine';
        osc.frequency.value = freq;
        
        filter.type = 'lowpass';
        filter.frequency.value = 150 + i * 50;
        
        gain.gain.value = 0.1 / (i + 1);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);
        
        osc.start();
      });
    }
    
    function playPulse(x, y, size) {
      if (!audioStarted) return;
      if (Math.random() > 0.3) return; // Not every pulse makes sound
      
      const now = audioCtx.currentTime;
      
      // Soft whoosh
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      
      // Pitch based on size (smaller = higher)
      const baseFreq = 100 + (70 - size) * 2;
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, now);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, now + 0.3);
      
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(300, now);
      filter.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.08, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }
    
    function animate() {
      // Deep sea gradient background
      const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
      bgGradient.addColorStop(0, '#020510');
      bgGradient.addColorStop(0.5, '#030820');
      bgGradient.addColorStop(1, '#010408');
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, width, height);
      
      // Subtle caustic light effect at top
      const time = Date.now() * 0.001;
      ctx.fillStyle = 'rgba(100, 150, 255, 0.02)';
      for (let i = 0; i < 5; i++) {
        const x = width * 0.5 + Math.sin(time * 0.3 + i) * width * 0.3;
        const y = Math.sin(time * 0.2 + i * 2) * 50;
        const r = 100 + Math.sin(time + i) * 30;
        
        ctx.beginPath();
        ctx.ellipse(x, y, r, r * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Mouse velocity
      const mouseVx = (mouseX - lastMouseX) * 0.1;
      const mouseVy = (mouseY - lastMouseY) * 0.1;
      lastMouseX = mouseX;
      lastMouseY = mouseY;
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.01; // Sink slowly
        p.life -= 0.01;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 * p.life, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.color.h}, ${p.color.s}%, ${p.color.l}%, ${p.life * 0.5})`;
        ctx.fill();
      }
      
      // Update and draw jellyfish
      for (const jelly of jellyfish) {
        jelly.update(mouseVx, mouseVy);
        jelly.draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    // Spawn jellyfish on click
    function spawn(x, y) {
      initAudio();
      
      if (jellyfish.length >= MAX_JELLYFISH) {
        // Remove oldest
        jellyfish.shift();
      }
      
      jellyfish.push(new Jellyfish(x, y));
    }
    
    canvas.addEventListener('click', (e) => {
      spawn(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      initAudio();
      const touch = e.touches[0];
      spawn(touch.clientX, touch.clientY);
    });
    
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
    });
    
    window.addEventListener('resize', resize);
    
    init();
    animate();
  </script>
</body>
</html>
