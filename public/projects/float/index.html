<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to top, #1a1a2e, #16213e, #0f3460);
      overflow: hidden;
    }
    canvas { display: block; }
    #back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 100;
      transition: color 0.3s;
    }
    #back:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <a href="/" id="back">← back</a>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };
    let you = null; // The particle that represents you
    
    const colors = [
      'rgba(255, 255, 255, 0.6)',
      'rgba(200, 220, 255, 0.5)',
      'rgba(180, 200, 240, 0.4)',
      'rgba(220, 180, 255, 0.5)',
      'rgba(180, 255, 220, 0.4)',
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Particle {
      constructor(x, y, isYou = false) {
        this.x = x;
        this.y = y;
        this.isYou = isYou;
        this.baseSize = isYou ? 12 : 3 + Math.random() * 8;
        this.size = this.baseSize;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = -0.2 - Math.random() * 0.5; // Upward drift
        this.color = isYou ? 'rgba(255, 255, 255, 0.9)' : colors[Math.floor(Math.random() * colors.length)];
        this.wobbleOffset = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.5 + Math.random() * 0.5;
        this.breathOffset = Math.random() * Math.PI * 2;
        this.breathSpeed = 0.3 + Math.random() * 0.2;
        this.opacity = 0;
        this.maxOpacity = isYou ? 1 : 0.3 + Math.random() * 0.4;
      }
      
      update(dt, time) {
        // Fade in
        this.opacity = Math.min(this.maxOpacity, this.opacity + dt * 0.5);
        
        // Gentle wobble
        const wobble = Math.sin(time * this.wobbleSpeed + this.wobbleOffset) * 0.2;
        
        // Breathing size
        const breath = Math.sin(time * this.breathSpeed + this.breathOffset);
        this.size = this.baseSize * (1 + breath * 0.15);
        
        // Movement
        this.x += (this.vx + wobble) * 60 * dt;
        this.y += this.vy * 60 * dt;
        
        // Soft boundaries - wrap horizontally
        if (this.x < -this.size) this.x = width + this.size;
        if (this.x > width + this.size) this.x = -this.size;
        
        // Reset when reaching top (for ambient particles)
        if (!this.isYou && this.y < -this.size * 2) {
          this.y = height + this.size;
          this.x = Math.random() * width;
          this.opacity = 0;
        }
        
        // "You" particle follows mouse gently when active
        if (this.isYou && mouse.active) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          this.vx += dx * 0.001;
          this.vy += dy * 0.001;
          
          // Damping
          this.vx *= 0.98;
          this.vy *= 0.98;
          
          // Still drift upward
          this.vy -= 0.005;
        }
        
        // Keep "you" on screen
        if (this.isYou) {
          if (this.y < this.size) {
            this.y = this.size;
            this.vy *= -0.3;
          }
          if (this.y > height - this.size) {
            this.y = height - this.size;
            this.vy *= -0.3;
          }
        }
      }
      
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        
        if (this.isYou) {
          // Glowing orb for "you"
          const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 2
          );
          gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
          gradient.addColorStop(0.3, 'rgba(200, 220, 255, 0.6)');
          gradient.addColorStop(0.6, 'rgba(150, 180, 255, 0.2)');
          gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
          
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
          ctx.fill();
          
          // Core
          ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Soft blur for ambient particles
          const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size
          );
          gradient.addColorStop(0, this.color);
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
          
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      }
    }
    
    function init() {
      resize();
      particles = [];
      
      // Ambient particles
      for (let i = 0; i < 60; i++) {
        particles.push(new Particle(
          Math.random() * width,
          Math.random() * height
        ));
      }
      
      // You - start at bottom center
      you = new Particle(width / 2, height * 0.8, true);
      particles.push(you);
    }
    
    function drawGradientBackground() {
      const gradient = ctx.createLinearGradient(0, height, 0, 0);
      gradient.addColorStop(0, '#1a1a2e');
      gradient.addColorStop(0.4, '#16213e');
      gradient.addColorStop(0.7, '#0f3460');
      gradient.addColorStop(1, '#0a1628');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }
    
    let lastTime = Date.now();
    let time = 0;
    
    function animate() {
      const now = Date.now();
      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;
      time += dt;
      
      drawGradientBackground();
      
      // Update and draw particles
      for (const p of particles) {
        p.update(dt, time);
      }
      
      // Draw in order (you last, on top)
      for (const p of particles) {
        if (!p.isYou) p.draw(ctx);
      }
      you.draw(ctx);
      
      // Subtle instruction
      if (time < 5) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, 0.2 - time * 0.04)})`;
        ctx.font = '14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('let go', width / 2, height - 40);
      }
      
      requestAnimationFrame(animate);
    }
    
    // Events
    window.addEventListener('resize', () => {
      resize();
      if (you) {
        you.x = Math.min(you.x, width);
        you.y = Math.min(you.y, height);
      }
    });
    
    function onMove(x, y) {
      mouse.x = x;
      mouse.y = y;
      mouse.active = true;
    }
    
    canvas.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    });
    
    canvas.addEventListener('mouseleave', () => { mouse.active = false; });
    canvas.addEventListener('touchend', () => { mouse.active = false; });
    
    init();
    animate();
  </script>
</body>
</html>
