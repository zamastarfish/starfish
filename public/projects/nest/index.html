<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nest — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to bottom, #7CB4D4, #B8D8E8);
      overflow: hidden; 
      font-family: Georgia, serif;
      min-height: 100vh;
    }
    canvas { display: block; }
    
    .nav-btn {
      position: fixed;
      top: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(90, 70, 50, 0.3);
      background: rgba(255, 255, 255, 0.5);
      color: rgba(90, 70, 50, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .nav-btn:hover {
      border-color: rgba(90, 70, 50, 0.6);
      color: rgba(90, 70, 50, 0.95);
      background: rgba(255, 255, 255, 0.8);
    }
    #homeBtn { left: 20px; }
    #infoBtn { right: 20px; }
    
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(255, 253, 245, 0.95);
      border: 1px solid rgba(90, 70, 50, 0.2);
      border-radius: 8px;
      padding: 20px;
      color: rgba(70, 55, 40, 0.9);
      font-size: 14px;
      line-height: 1.6;
      display: none;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    #info h3 {
      color: rgba(90, 70, 50, 0.95);
      margin-bottom: 10px;
      font-weight: normal;
      font-style: italic;
    }
    #info p { margin-bottom: 8px; }
    #info .close {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
      color: rgba(90, 70, 50, 0.5);
    }
    
    #start-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(90, 70, 50, 0.5);
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.5px;
      z-index: 50;
      pointer-events: none;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <button id="homeBtn" class="nav-btn" title="Back to gallery">←</button>
  <button id="infoBtn" class="nav-btn" title="About this piece">?</button>
  
  <div id="info">
    <span class="close">×</span>
    <h3>nest</h3>
    <p>Twig by twig, a home takes shape. Instinct older than memory, 
    the same weaving done for millions of years.</p>
    <p>Watch the nest grow. Click to bring a new twig. Some will be woven in, 
    others discarded — not every material belongs.</p>
    <p><em>What compels us to build?</em></p>
  </div>
  
  <div id="start-prompt">click to begin</div>
  
  <canvas id="canvas"></canvas>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let audioStarted = false;
    let audioCtx, masterGain;
    
    // Nest structure
    let twigs = [];
    let incomingTwigs = [];
    let nestCenter;
    let nestRadius = 60;
    let nestDepth = 0; // How built up it is
    
    // Branch the nest sits on
    let branch;
    
    // Leaves in background
    let leaves = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      nestCenter = { x: width / 2, y: height * 0.55 };
      
      // Branch
      branch = {
        x1: width * 0.2,
        y1: height * 0.6,
        x2: width * 0.8,
        y2: height * 0.55,
        thickness: 25
      };
      
      // Generate some leaves
      leaves = [];
      for (let i = 0; i < 30; i++) {
        leaves.push({
          x: Math.random() * width,
          y: Math.random() * height * 0.4,
          size: 15 + Math.random() * 25,
          angle: Math.random() * Math.PI * 2,
          sway: Math.random() * Math.PI * 2
        });
      }
      
      // Start with a few twigs
      if (twigs.length === 0) {
        for (let i = 0; i < 8; i++) {
          addTwig();
        }
      }
    }
    
    function addTwig() {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * nestRadius * 0.8;
      const length = 20 + Math.random() * 40;
      const twigAngle = angle + (Math.random() - 0.5) * 1.5;
      
      twigs.push({
        x: nestCenter.x + Math.cos(angle) * dist,
        y: nestCenter.y + Math.sin(angle) * dist * 0.4,
        length: length,
        angle: twigAngle,
        thickness: 1 + Math.random() * 2,
        color: getTwigColor(),
        curve: (Math.random() - 0.5) * 0.3,
        placed: true
      });
      
      nestDepth = Math.min(1, twigs.length / 50);
      nestRadius = 60 + nestDepth * 30;
    }
    
    function getTwigColor() {
      const browns = [
        { r: 101, g: 67, b: 33 },   // Dark brown
        { r: 139, g: 90, b: 43 },   // Sienna
        { r: 160, g: 120, b: 70 },  // Tan
        { r: 120, g: 80, b: 40 },   // Medium brown
        { r: 90, g: 60, b: 30 },    // Deep brown
      ];
      const c = browns[Math.floor(Math.random() * browns.length)];
      return `rgb(${c.r + Math.random() * 20 - 10}, ${c.g + Math.random() * 20 - 10}, ${c.b + Math.random() * 20 - 10})`;
    }
    
    function spawnIncomingTwig(x, y) {
      incomingTwigs.push({
        x: x,
        y: y - 100,
        targetX: nestCenter.x + (Math.random() - 0.5) * nestRadius,
        targetY: nestCenter.y + (Math.random() - 0.5) * nestRadius * 0.4,
        length: 20 + Math.random() * 40,
        angle: Math.random() * Math.PI,
        thickness: 1 + Math.random() * 2,
        color: getTwigColor(),
        curve: (Math.random() - 0.5) * 0.3,
        vy: 0,
        phase: 'falling', // falling, placing
        accepted: Math.random() > 0.15 // 85% chance of being accepted
      });
      
      playRustle();
    }
    
    function updateIncomingTwigs() {
      incomingTwigs.forEach((t, i) => {
        if (t.phase === 'falling') {
          t.vy += 0.15;
          t.y += t.vy;
          t.angle += 0.02;
          
          // Check if reached nest area
          if (t.y > t.targetY) {
            t.phase = 'placing';
            t.y = t.targetY;
            
            if (t.accepted) {
              // Add to nest
              twigs.push({
                x: t.targetX,
                y: t.targetY,
                length: t.length,
                angle: t.angle,
                thickness: t.thickness,
                color: t.color,
                curve: t.curve,
                placed: true
              });
              
              nestDepth = Math.min(1, twigs.length / 50);
              nestRadius = 60 + nestDepth * 30;
              
              playPlace();
            } else {
              // Rejected - falls away
              t.phase = 'rejected';
              t.vy = -3;
              t.vx = (Math.random() - 0.5) * 4;
            }
            
            incomingTwigs.splice(i, 1);
          }
        } else if (t.phase === 'rejected') {
          t.vy += 0.2;
          t.y += t.vy;
          t.x += t.vx;
          t.angle += 0.05;
          
          if (t.y > height + 50) {
            incomingTwigs.splice(i, 1);
          }
        }
      });
    }
    
    function drawBranch() {
      ctx.save();
      
      // Main branch
      ctx.strokeStyle = '#5D4037';
      ctx.lineWidth = branch.thickness;
      ctx.lineCap = 'round';
      
      ctx.beginPath();
      ctx.moveTo(branch.x1, branch.y1);
      ctx.quadraticCurveTo(
        width * 0.5, height * 0.52,
        branch.x2, branch.y2
      );
      ctx.stroke();
      
      // Bark texture
      ctx.strokeStyle = '#4E342E';
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const t = 0.2 + i * 0.08;
        const x = branch.x1 + (branch.x2 - branch.x1) * t;
        const y = branch.y1 + (branch.y2 - branch.y1) * t - 5;
        ctx.beginPath();
        ctx.moveTo(x, y - 5);
        ctx.lineTo(x + 3, y + 8);
        ctx.stroke();
      }
      
      ctx.restore();
    }
    
    function drawNest() {
      // Nest shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.beginPath();
      ctx.ellipse(nestCenter.x + 5, nestCenter.y + 10, nestRadius * 1.1, nestRadius * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Back twigs (behind nest cup)
      const backTwigs = twigs.filter((_, i) => i % 3 === 0);
      backTwigs.forEach(t => drawTwig(t));
      
      // Nest cup (the depression)
      const cupDepth = 15 + nestDepth * 20;
      ctx.fillStyle = '#3E2723';
      ctx.beginPath();
      ctx.ellipse(nestCenter.x, nestCenter.y, nestRadius * 0.7, cupDepth, 0, 0, Math.PI);
      ctx.fill();
      
      // Cup interior
      ctx.fillStyle = '#5D4037';
      ctx.beginPath();
      ctx.ellipse(nestCenter.x, nestCenter.y - 3, nestRadius * 0.6, cupDepth - 5, 0, 0, Math.PI);
      ctx.fill();
      
      // Front twigs
      const frontTwigs = twigs.filter((_, i) => i % 3 !== 0);
      frontTwigs.forEach(t => drawTwig(t));
    }
    
    function drawTwig(t) {
      ctx.save();
      ctx.translate(t.x, t.y);
      ctx.rotate(t.angle);
      
      ctx.strokeStyle = t.color;
      ctx.lineWidth = t.thickness;
      ctx.lineCap = 'round';
      
      ctx.beginPath();
      ctx.moveTo(-t.length / 2, 0);
      ctx.quadraticCurveTo(0, t.curve * t.length, t.length / 2, 0);
      ctx.stroke();
      
      ctx.restore();
    }
    
    function drawIncomingTwigs() {
      incomingTwigs.forEach(t => {
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.rotate(t.angle);
        
        ctx.strokeStyle = t.color;
        ctx.lineWidth = t.thickness;
        ctx.lineCap = 'round';
        
        ctx.beginPath();
        ctx.moveTo(-t.length / 2, 0);
        ctx.quadraticCurveTo(0, t.curve * t.length, t.length / 2, 0);
        ctx.stroke();
        
        ctx.restore();
      });
    }
    
    function drawLeaves() {
      const time = Date.now() * 0.001;
      
      leaves.forEach(leaf => {
        const sway = Math.sin(time + leaf.sway) * 0.1;
        
        ctx.save();
        ctx.translate(leaf.x, leaf.y);
        ctx.rotate(leaf.angle + sway);
        
        // Leaf shape
        ctx.fillStyle = `rgba(80, 140, 80, 0.6)`;
        ctx.beginPath();
        ctx.ellipse(0, 0, leaf.size / 2, leaf.size / 4, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Leaf vein
        ctx.strokeStyle = 'rgba(60, 100, 60, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-leaf.size / 2 + 3, 0);
        ctx.lineTo(leaf.size / 2 - 3, 0);
        ctx.stroke();
        
        ctx.restore();
      });
    }
    
    function draw() {
      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, height);
      skyGrad.addColorStop(0, '#87CEEB');
      skyGrad.addColorStop(1, '#B8D8E8');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, width, height);
      
      // Background leaves
      drawLeaves();
      
      // Branch
      drawBranch();
      
      // Nest
      drawNest();
      
      // Incoming twigs
      updateIncomingTwigs();
      drawIncomingTwigs();
      
      // Auto-add twigs slowly
      if (Math.random() < 0.003 && twigs.length < 60) {
        spawnIncomingTwig(
          nestCenter.x + (Math.random() - 0.5) * 200,
          0
        );
      }
      
      requestAnimationFrame(draw);
    }
    
    // Audio
    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      
      document.getElementById('start-prompt').style.opacity = '0';
      
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioCtx.destination);
      
      startAmbient();
    }
    
    function startAmbient() {
      // Wind through leaves - filtered noise
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 600;
      filter.Q.value = 0.8;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.06;
      
      // LFO for wind variation
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.15;
      lfoGain.gain.value = 200;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);
      lfo.start();
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      noise.start();
      
      // Occasional bird chirps
      setInterval(() => {
        if (Math.random() < 0.3) {
          playChirp();
        }
      }, 3000);
    }
    
    function playChirp() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      const baseFreq = 2000 + Math.random() * 1500;
      
      // Two-note chirp
      for (let i = 0; i < 2; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        const t = now + i * 0.12;
        osc.frequency.setValueAtTime(baseFreq * (1 + i * 0.2), t);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * (1.1 + i * 0.15), t + 0.05);
        
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.08, t + 0.02);
        gain.gain.linearRampToValueAtTime(0, t + 0.1);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start(t);
        osc.stop(t + 0.15);
      }
    }
    
    function playRustle() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      const bufferSize = audioCtx.sampleRate * 0.15;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 3000;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.1;
      
      source.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      source.start(now);
    }
    
    function playPlace() {
      if (!audioCtx) return;
      
      const now = audioCtx.currentTime;
      
      // Soft thud/rustle
      const bufferSize = audioCtx.sampleRate * 0.1;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      
      const gain = audioCtx.createGain();
      gain.gain.value = 0.15;
      
      source.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      
      source.start(now);
    }
    
    // Events
    canvas.addEventListener('click', (e) => {
      initAudio();
      spawnIncomingTwig(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      initAudio();
      spawnIncomingTwig(e.touches[0].clientX, e.touches[0].clientY);
    });
    
    // Navigation
    document.getElementById('homeBtn').onclick = () => {
      window.location.href = '/';
    };
    
    document.getElementById('infoBtn').onclick = () => {
      document.getElementById('info').style.display = 'block';
    };
    
    document.querySelector('#info .close').onclick = () => {
      document.getElementById('info').style.display = 'none';
    };
    
    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
