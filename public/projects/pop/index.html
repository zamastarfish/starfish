<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pop — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(to bottom, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      overflow: hidden; 
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; cursor: pointer; }
    
    #info-btn, #nav-btn {
      position: fixed;
      bottom: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-btn { right: 20px; }
    #nav-btn { right: 66px; font-size: 14px; }
    #info-btn:hover, #nav-btn:hover {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }
    
    #info-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 280px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #info-panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
    }
    #info-panel p { margin: 0 0 8px 0; }
    #info-panel p:last-child { margin: 0; }
    .info-muted { color: rgba(255,255,255,0.5); font-size: 11px; }
    
    #score {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-family: monospace;
      z-index: 50;
    }
    
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    #start-overlay span {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="start-overlay"><span>click to begin</span></div>
  <div id="score">0</div>
  <canvas id="canvas"></canvas>
  <button id="nav-btn">↖</button>
  <button id="info-btn">?</button>
  <div id="info-panel">
    <h3>pop</h3>
    <p>Bubbles rise. Pop them.</p>
    <p>That's it. Sometimes the simple pleasures are enough.</p>
    <p class="info-muted">Touch/click to pop • Each bubble is a tiny gift</p>
  </div>
  
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    
    let width, height;
    let bubbles = [];
    let pops = [];
    let score = 0;
    let audioStarted = false;
    
    // Audio
    let popSynth, ambientFilter, ambientNoise;
    
    const colors = [
      { h: 200, s: 70, l: 70 }, // Blue
      { h: 280, s: 60, l: 75 }, // Purple
      { h: 320, s: 65, l: 75 }, // Pink
      { h: 170, s: 60, l: 65 }, // Teal
      { h: 45, s: 80, l: 70 },  // Gold
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    async function initAudio() {
      await Tone.start();
      
      // Pop sound - bright, bubbly
      popSynth = new Tone.Synth({
        oscillator: { type: 'sine' },
        envelope: {
          attack: 0.005,
          decay: 0.1,
          sustain: 0,
          release: 0.2
        }
      }).toDestination();
      popSynth.volume.value = -10;
      
      // Ambient underwater feel
      ambientNoise = new Tone.Noise('pink').start();
      ambientFilter = new Tone.Filter(300, 'lowpass').toDestination();
      ambientNoise.connect(ambientFilter);
      ambientNoise.volume.value = -35;
      
      audioStarted = true;
    }
    
    function spawnBubble() {
      const color = colors[Math.floor(Math.random() * colors.length)];
      const radius = 15 + Math.random() * 35;
      
      bubbles.push({
        x: Math.random() * width,
        y: height + radius,
        radius,
        baseRadius: radius,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -0.5 - Math.random() * 1.5,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.02,
        color,
        opacity: 0.6 + Math.random() * 0.3
      });
    }
    
    function popBubble(bubble, x, y) {
      // Create pop particles
      const numParticles = 8 + Math.floor(bubble.radius / 5);
      for (let i = 0; i < numParticles; i++) {
        const angle = (i / numParticles) * Math.PI * 2;
        const speed = 2 + Math.random() * 3;
        pops.push({
          x: bubble.x,
          y: bubble.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: 2 + Math.random() * 3,
          color: bubble.color,
          life: 1
        });
      }
      
      // Play sound
      if (audioStarted) {
        // Higher pitch for smaller bubbles
        const freq = 400 + (50 - bubble.radius) * 10;
        popSynth.triggerAttackRelease(freq, '16n');
      }
      
      score++;
      scoreEl.textContent = score;
    }
    
    function update() {
      // Spawn bubbles
      if (Math.random() < 0.03) {
        spawnBubble();
      }
      
      // Update bubbles
      bubbles = bubbles.filter(b => {
        b.wobblePhase += b.wobbleSpeed;
        b.x += b.vx + Math.sin(b.wobblePhase) * 0.5;
        b.y += b.vy;
        
        // Subtle size pulsing
        b.radius = b.baseRadius + Math.sin(b.wobblePhase * 2) * 2;
        
        // Remove if off screen
        return b.y + b.radius > 0;
      });
      
      // Update pop particles
      pops = pops.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1; // gravity
        p.life -= 0.03;
        p.radius *= 0.98;
        return p.life > 0;
      });
    }
    
    function draw() {
      ctx.clearRect(0, 0, width, height);
      
      // Draw bubbles
      bubbles.forEach(b => {
        // Main bubble
        const gradient = ctx.createRadialGradient(
          b.x - b.radius * 0.3, b.y - b.radius * 0.3, 0,
          b.x, b.y, b.radius
        );
        gradient.addColorStop(0, `hsla(${b.color.h}, ${b.color.s}%, 95%, ${b.opacity * 0.8})`);
        gradient.addColorStop(0.5, `hsla(${b.color.h}, ${b.color.s}%, ${b.color.l}%, ${b.opacity * 0.5})`);
        gradient.addColorStop(1, `hsla(${b.color.h}, ${b.color.s}%, ${b.color.l}%, ${b.opacity * 0.2})`);
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // Highlight
        ctx.beginPath();
        ctx.arc(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${b.opacity * 0.6})`;
        ctx.fill();
        
        // Edge
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${b.color.h}, ${b.color.s}%, ${b.color.l + 10}%, ${b.opacity * 0.3})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      });
      
      // Draw pop particles
      pops.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.color.h}, ${p.color.s}%, ${p.color.l}%, ${p.life})`;
        ctx.fill();
      });
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    function checkPop(x, y) {
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        const dx = x - b.x;
        const dy = y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < b.radius) {
          popBubble(b, x, y);
          bubbles.splice(i, 1);
          return true;
        }
      }
      return false;
    }
    
    // Interaction
    canvas.addEventListener('click', (e) => {
      checkPop(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (e.buttons === 1) {
        checkPop(e.clientX, e.clientY);
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      Array.from(e.touches).forEach(t => {
        checkPop(t.clientX, t.clientY);
      });
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      Array.from(e.touches).forEach(t => {
        checkPop(t.clientX, t.clientY);
      });
    });
    
    // Info panel
    document.getElementById('info-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('info-panel').classList.toggle('visible');
    });
    
    document.getElementById('nav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      window.location.href = '/';
    });
    
    // Start overlay
    document.getElementById('start-overlay').addEventListener('click', async () => {
      document.getElementById('start-overlay').style.display = 'none';
      await initAudio();
    });
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
