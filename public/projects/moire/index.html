<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>moiré</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      background: #fafafa;
      touch-action: none;
    }
    canvas { display: block; }
    /* Navigation */
    .sf-nav { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 12px; }
    .sf-nav a, .sf-nav button { 
      background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.4); text-decoration: none; font-size: 18px; 
      width: 36px; height: 36px; border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.3s; font-family: system-ui, sans-serif;
    }
    .sf-nav a:hover, .sf-nav button:hover { 
      background: rgba(0,0,0,0.8); color: rgba(0,0,0,0.8);
      border-color: rgba(0,0,0,0.3);
    }
    .sf-modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .sf-modal.open { display: flex; }
    .sf-modal-content {
      background: #111; border: 1px solid #333; border-radius: 12px;
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
      padding: 30px; color: #ddd; font-family: system-ui, sans-serif;
    }
    .sf-modal h2 { margin: 0 0 20px; font-weight: 400; font-size: 24px; color: #fff; }
    .sf-modal h3 { margin: 20px 0 8px; font-weight: 500; font-size: 12px; 
      text-transform: uppercase; letter-spacing: 1px; color: #888; }
    .sf-modal p { margin: 0; line-height: 1.6; font-size: 15px; color: #aaa; }
    .sf-modal-close { 
      position: absolute; top: 20px; right: 20px; background: none; border: none;
      color: #666; font-size: 24px; cursor: pointer; padding: 10px;
    }
    .sf-modal-close:hover { color: #fff; }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="sf-nav">
    <a href="/" title="Back to gallery">←</a>
    <button onclick="document.getElementById('sf-modal').classList.add('open')" title="About this piece">?</button>
  </nav>
  
  <!-- Info Modal -->
  <div id="sf-modal" class="sf-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <button class="sf-modal-close" onclick="document.getElementById('sf-modal').classList.remove('open')">×</button>
    <div class="sf-modal-content">
      <h2>Moiré</h2>
      <h3>Concept</h3>
      <p>Op art interference patterns. Two grids, slightly offset, create phantom shapes your eyes invent.</p>
      <h3>Interaction</h3>
      <p>Move to shift the layers. The patterns you see aren't really there — your visual system is lying to you.</p>
    </div>
  </div>

  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let centerX, centerY;
    let mouseX, mouseY;
    let targetX, targetY;
    let time = 0;
    
    // Pattern parameters
    const lineWidth = 1.5;
    const baseSpacing = 8;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
      mouseX = targetX = centerX;
      mouseY = targetY = centerY;
    }
    
    function drawLinePattern(offsetX, offsetY, rotation, spacing, color) {
      ctx.save();
      ctx.translate(centerX + offsetX, centerY + offsetY);
      ctx.rotate(rotation);
      
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      
      const diagonal = Math.sqrt(width * width + height * height);
      const count = Math.ceil(diagonal / spacing) + 10;
      
      ctx.beginPath();
      for (let i = -count; i <= count; i++) {
        const x = i * spacing;
        ctx.moveTo(x, -diagonal);
        ctx.lineTo(x, diagonal);
      }
      ctx.stroke();
      
      ctx.restore();
    }
    
    function drawCirclePattern(offsetX, offsetY, spacing, color) {
      ctx.save();
      ctx.translate(centerX + offsetX, centerY + offsetY);
      
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      
      const maxRadius = Math.sqrt(width * width + height * height);
      const count = Math.ceil(maxRadius / spacing);
      
      for (let i = 1; i <= count; i++) {
        ctx.beginPath();
        ctx.arc(0, 0, i * spacing, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      ctx.restore();
    }
    
    function draw() {
      time += 0.005;
      
      // Smooth mouse follow
      mouseX += (targetX - mouseX) * 0.08;
      mouseY += (targetY - mouseY) * 0.08;
      
      // Mouse offset from center, normalized
      const dx = (mouseX - centerX) / (width / 2);
      const dy = (mouseY - centerY) / (height / 2);
      
      // Clear
      ctx.fillStyle = '#fafafa';
      ctx.fillRect(0, 0, width, height);
      
      // Pattern 1: Fixed vertical lines
      drawLinePattern(0, 0, 0, baseSpacing, 'rgba(0, 0, 0, 0.7)');
      
      // Pattern 2: Lines that follow mouse (creates moiré)
      const offset1X = dx * 30 + Math.sin(time) * 5;
      const offset1Y = dy * 30 + Math.cos(time * 0.7) * 5;
      const rotation1 = dx * 0.1 + Math.sin(time * 0.3) * 0.02;
      const spacing1 = baseSpacing + Math.sin(time * 0.5) * 0.5;
      drawLinePattern(offset1X, offset1Y, rotation1, spacing1, 'rgba(0, 0, 0, 0.7)');
      
      // Pattern 3: Circles from center
      ctx.globalCompositeOperation = 'multiply';
      drawCirclePattern(0, 0, baseSpacing * 1.5, 'rgba(0, 0, 0, 0.3)');
      
      // Pattern 4: Offset circles (creates radial moiré)
      const offset2X = -dx * 20 + Math.cos(time * 0.8) * 3;
      const offset2Y = -dy * 20 + Math.sin(time * 0.6) * 3;
      drawCirclePattern(offset2X, offset2Y, baseSpacing * 1.5 + Math.sin(time * 0.4) * 0.3, 'rgba(0, 0, 0, 0.3)');
      
      ctx.globalCompositeOperation = 'source-over';
      
      // Subtle pulsing center point
      const pulseSize = 3 + Math.sin(time * 2) * 1;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.beginPath();
      ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    // Mouse events
    canvas.addEventListener('mousemove', (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    });
    
    canvas.addEventListener('mouseleave', () => {
      targetX = centerX;
      targetY = centerY;
    });
    
    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      targetX = touch.clientX;
      targetY = touch.clientY;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      targetX = touch.clientX;
      targetY = touch.clientY;
    });
    
    canvas.addEventListener('touchend', () => {
      targetX = centerX;
      targetY = centerY;
    });
    
    window.addEventListener('resize', resize);
    
    resize();
    animate();
  </script>
</body>
</html>
