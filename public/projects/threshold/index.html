<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>threshold — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      overflow: hidden; 
      font-family: 'Georgia', serif;
    }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #distance {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      font-family: monospace;
      pointer-events: none;
    }
    #start {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 220, 180, 0.5);
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      padding: 20px 40px;
      border: 1px solid rgba(255, 220, 180, 0.2);
      background: rgba(0,0,0,0.5);
      transition: all 0.3s;
      z-index: 100;
    }
    #start:hover {
      border-color: rgba(255, 220, 180, 0.4);
      color: rgba(255, 220, 180, 0.8);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">approach</div>
  <div id="distance"></div>
  <div id="start">enter</div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const distanceEl = document.getElementById('distance');
    const startBtn = document.getElementById('start');
    
    let width, height;
    let targetX, targetY;
    let playerX, playerY;
    let approaching = false;
    let totalDistance = 0;
    let distanceTraveled = 0;
    let lastPlayerX, lastPlayerY;
    let audioStarted = false;
    
    // Audio - rising tension that never resolves
    let drone1, drone2, drone3;
    let droneGain, masterGain;
    let filter;
    let lfo;
    
    // Base frequencies - approaching but never reaching the octave
    const baseFreq = 110; // A2
    const targetFreq = 220; // A3 - the resolution we never reach
    
    // The threshold — always visible, never reachable
    const thresholdRadius = 60;
    let thresholdGlow = 0;
    
    // Trail of where you've been
    const trail = [];
    const maxTrail = 200;
    
    // Particles around threshold
    const particles = [];
    const numParticles = 50;
    
    function initAudio() {
      masterGain = new Tone.Gain(0.5).toDestination();
      
      // Reverb for space
      const reverb = new Tone.Reverb({
        decay: 6,
        wet: 0.4
      }).connect(masterGain);
      
      // Filter - opens as we approach
      filter = new Tone.Filter({
        type: 'lowpass',
        frequency: 300,
        Q: 1
      }).connect(reverb);
      
      droneGain = new Tone.Gain(0.3).connect(filter);
      
      // Three oscillators for rich drone
      // They will rise in pitch as we approach, but asymptotically
      drone1 = new Tone.Oscillator({
        frequency: baseFreq,
        type: 'sine'
      }).connect(droneGain);
      
      drone2 = new Tone.Oscillator({
        frequency: baseFreq * 1.5, // Perfect fifth
        type: 'sine',
        volume: -6
      }).connect(droneGain);
      
      drone3 = new Tone.Oscillator({
        frequency: baseFreq * 2.01, // Slightly detuned octave - tension
        type: 'sine',
        volume: -12
      }).connect(droneGain);
      
      // Subtle LFO for movement
      lfo = new Tone.LFO({
        frequency: 0.1,
        min: 0.25,
        max: 0.35
      }).start();
      lfo.connect(droneGain.gain);
      
      // Start drones
      drone1.start();
      drone2.start();
      drone3.start();
    }
    
    function updateAudio(closeness) {
      if (!audioStarted) return;
      
      // closeness is 0 (far) to ~1 (very close, but never 1)
      // We approach the target frequency but never reach it
      // Using the same Zeno logic: each step is half the remaining distance
      
      const freqRange = targetFreq - baseFreq;
      const currentFreq = baseFreq + (freqRange * closeness * 0.95); // Never quite reach target
      
      // Smooth frequency transitions
      drone1.frequency.rampTo(currentFreq, 0.3);
      drone2.frequency.rampTo(currentFreq * 1.5, 0.3);
      drone3.frequency.rampTo(currentFreq * 2.01, 0.3); // Stays slightly detuned
      
      // Filter opens as we approach - more harmonics, more tension
      const filterFreq = 300 + closeness * 2000;
      filter.frequency.rampTo(filterFreq, 0.3);
      
      // Volume increases slightly with closeness
      const vol = 0.3 + closeness * 0.2;
      droneGain.gain.rampTo(vol, 0.3);
      
      // LFO speeds up as tension builds
      lfo.frequency.rampTo(0.1 + closeness * 0.3, 0.5);
    }
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      
      // Place threshold in center
      targetX = width / 2;
      targetY = height / 2;
      
      // Start player at edge
      if (!playerX) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.min(width, height) * 0.4;
        playerX = targetX + Math.cos(angle) * dist;
        playerY = targetY + Math.sin(angle) * dist;
        lastPlayerX = playerX;
        lastPlayerY = playerY;
        totalDistance = dist;
      }
      
      // Init particles
      if (particles.length === 0) {
        for (let i = 0; i < numParticles; i++) {
          particles.push({
            angle: Math.random() * Math.PI * 2,
            radius: thresholdRadius + 10 + Math.random() * 30,
            speed: 0.001 + Math.random() * 0.002,
            size: 1 + Math.random() * 2,
            alpha: 0.2 + Math.random() * 0.3
          });
        }
      }
    }
    
    function distance(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }
    
    function update() {
      const dist = distance(playerX, playerY, targetX, targetY);
      const closeness = Math.max(0, 1 - (dist / totalDistance));
      
      if (approaching) {
        const dx = targetX - playerX;
        const dy = targetY - playerY;
        
        // Zeno's paradox: always move half the remaining distance
        // But with a minimum step to keep it interesting
        const step = Math.max(dist * 0.02, 0.5);
        
        if (dist > thresholdRadius + 5) {
          const moved = Math.min(step, dist - thresholdRadius - 5);
          playerX += (dx / dist) * moved;
          playerY += (dy / dist) * moved;
          
          // Track distance traveled
          const actualMoved = distance(lastPlayerX, lastPlayerY, playerX, playerY);
          distanceTraveled += actualMoved;
          lastPlayerX = playerX;
          lastPlayerY = playerY;
          
          // Add to trail
          trail.push({ x: playerX, y: playerY, age: 0 });
          if (trail.length > maxTrail) trail.shift();
        }
        
        // Glow intensifies as you get closer
        thresholdGlow = closeness;
      }
      
      // Update audio based on closeness
      updateAudio(closeness);
      
      // Age trail
      for (let t of trail) {
        t.age += 0.01;
      }
      
      // Update particles
      for (let p of particles) {
        p.angle += p.speed;
      }
    }
    
    function draw() {
      // Fade background
      ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw trail
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        const alpha = Math.max(0, 0.3 - t.age);
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100, 150, 200, ${alpha})`;
        ctx.fill();
      }
      
      // Draw threshold glow
      const glowSize = thresholdRadius + 40 + thresholdGlow * 30;
      const gradient = ctx.createRadialGradient(
        targetX, targetY, thresholdRadius * 0.5,
        targetX, targetY, glowSize
      );
      gradient.addColorStop(0, `rgba(255, 220, 180, ${0.1 + thresholdGlow * 0.2})`);
      gradient.addColorStop(0.5, `rgba(255, 180, 120, ${0.05 + thresholdGlow * 0.1})`);
      gradient.addColorStop(1, 'rgba(255, 150, 100, 0)');
      
      ctx.beginPath();
      ctx.arc(targetX, targetY, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Draw threshold circle
      ctx.beginPath();
      ctx.arc(targetX, targetY, thresholdRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 220, 180, ${0.3 + thresholdGlow * 0.4})`;
      ctx.lineWidth = 1;
      ctx.stroke();
      
      // Inner glow
      const innerGradient = ctx.createRadialGradient(
        targetX, targetY, 0,
        targetX, targetY, thresholdRadius
      );
      innerGradient.addColorStop(0, `rgba(255, 240, 220, ${0.15 + thresholdGlow * 0.2})`);
      innerGradient.addColorStop(1, 'rgba(255, 220, 180, 0)');
      ctx.fillStyle = innerGradient;
      ctx.fill();
      
      // Draw particles orbiting threshold
      for (let p of particles) {
        const px = targetX + Math.cos(p.angle) * p.radius;
        const py = targetY + Math.sin(p.angle) * p.radius;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 220, 180, ${p.alpha * (0.5 + thresholdGlow * 0.5)})`;
        ctx.fill();
      }
      
      // Draw player
      const dist = distance(playerX, playerY, targetX, targetY);
      const playerGlow = Math.max(0, 1 - dist / totalDistance) * 0.5;
      
      ctx.beginPath();
      ctx.arc(playerX, playerY, 8, 0, Math.PI * 2);
      const playerGradient = ctx.createRadialGradient(
        playerX, playerY, 0,
        playerX, playerY, 8
      );
      playerGradient.addColorStop(0, `rgba(150, 200, 255, ${0.8 + playerGlow})`);
      playerGradient.addColorStop(1, 'rgba(100, 150, 200, 0.3)');
      ctx.fillStyle = playerGradient;
      ctx.fill();
      
      // Update distance display
      const remaining = Math.max(0, dist - thresholdRadius).toFixed(1);
      const percent = ((1 - dist / totalDistance) * 100).toFixed(2);
      distanceEl.textContent = `${percent}% there`;
      
      // Update info based on state
      if (dist < thresholdRadius + 10) {
        info.textContent = 'almost';
        info.style.opacity = 0.6;
      } else if (approaching) {
        info.textContent = 'approaching';
        info.style.opacity = 0.4;
      } else {
        info.textContent = 'hold to approach';
        info.style.opacity = 0.3;
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Hold to approach
    canvas.addEventListener('mousedown', () => {
      if (!audioStarted) return;
      approaching = true;
    });
    
    canvas.addEventListener('mouseup', () => {
      approaching = false;
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!audioStarted) return;
      approaching = true;
    });
    
    canvas.addEventListener('touchend', () => {
      approaching = false;
    });
    
    // Start with audio
    startBtn.addEventListener('click', async () => {
      await Tone.start();
      initAudio();
      audioStarted = true;
      startBtn.classList.add('hidden');
    });
    
    window.addEventListener('resize', resize);
    
    resize();
    animate();
  </script>
</body>
</html>
