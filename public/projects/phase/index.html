<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phase — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      overflow: hidden; 
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; cursor: pointer; }
    
    #info-btn, #nav-btn {
      position: fixed;
      bottom: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-btn { right: 20px; }
    #nav-btn { right: 66px; font-size: 14px; }
    #info-btn:hover, #nav-btn:hover {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }
    
    #info-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 280px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #info-panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
    }
    #info-panel p { margin: 0 0 8px 0; }
    #info-panel p:last-child { margin: 0; }
    .info-muted { color: rgba(255,255,255,0.5); font-size: 11px; }
    
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    #start-overlay span {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="start-overlay"><span>click to begin</span></div>
  <canvas id="canvas"></canvas>
  <button id="nav-btn">↖</button>
  <button id="info-btn">?</button>
  <div id="info-panel">
    <h3>phase</h3>
    <p>Two identical patterns, one running slightly faster. Like Steve Reich's phasing compositions—gradual shift, eventual realignment.</p>
    <p>The patterns are the same. The difference is time.</p>
    <p class="info-muted">Click to reset phase • Drag to adjust drift speed</p>
  </div>
  
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let audioStarted = false;
    let synths = [];
    let driftRate = 0.0003; // How fast they drift apart
    let phaseOffset = 0;
    let pattern = [];
    const numNotes = 12;
    const baseNote = 60; // Middle C
    
    // Steve Reich inspired pattern (like Piano Phase)
    const intervals = [0, 4, 7, 11, 12, 7, 4, 11, 0, 7, 4, 0];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    async function initAudio() {
      await Tone.start();
      
      // Two identical synths with slight detuning for warmth
      for (let i = 0; i < 2; i++) {
        const synth = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: 'sine' },
          envelope: {
            attack: 0.02,
            decay: 0.3,
            sustain: 0.1,
            release: 0.8
          },
          volume: -12
        }).toDestination();
        
        // Add reverb
        const reverb = new Tone.Reverb({ decay: 3, wet: 0.4 }).toDestination();
        synth.connect(reverb);
        
        synths.push(synth);
      }
      
      audioStarted = true;
    }
    
    // Convert MIDI note to frequency
    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }
    
    // Draw a single note indicator
    function drawNote(x, y, radius, alpha, hue) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 60%, 70%, ${alpha})`;
      ctx.fill();
      
      // Glow
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius * 3);
      gradient.addColorStop(0, `hsla(${hue}, 60%, 70%, ${alpha * 0.3})`);
      gradient.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(x, y, radius * 3, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }
    
    let lastBeatTime = [0, 0];
    let currentIndex = [0, 0];
    const tempo = 200; // ms per note
    
    function update(time) {
      // Pattern 1 (top) - normal speed
      const elapsed1 = time - lastBeatTime[0];
      if (elapsed1 > tempo) {
        lastBeatTime[0] = time;
        if (audioStarted) {
          const note = baseNote + intervals[currentIndex[0]];
          synths[0].triggerAttackRelease(midiToFreq(note), '16n');
        }
        currentIndex[0] = (currentIndex[0] + 1) % intervals.length;
      }
      
      // Pattern 2 (bottom) - slightly faster
      const adjustedTempo = tempo * (1 - driftRate * 100);
      const elapsed2 = time - lastBeatTime[1];
      if (elapsed2 > adjustedTempo) {
        lastBeatTime[1] = time;
        if (audioStarted) {
          const note = baseNote + intervals[currentIndex[1]];
          synths[1].triggerAttackRelease(midiToFreq(note), '16n');
        }
        currentIndex[1] = (currentIndex[1] + 1) % intervals.length;
      }
      
      // Track phase difference
      phaseOffset = (currentIndex[1] - currentIndex[0] + intervals.length) % intervals.length;
    }
    
    function draw(time) {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      const centerY1 = height * 0.35;
      const centerY2 = height * 0.65;
      const spacing = width / (intervals.length + 2);
      const startX = spacing * 1.5;
      
      // Draw pattern labels
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '12px system-ui';
      ctx.fillText('pattern A', 20, centerY1 - 50);
      ctx.fillText('pattern B (faster)', 20, centerY2 - 50);
      
      // Draw phase indicator
      const phasePercent = (phaseOffset / intervals.length * 100).toFixed(0);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(`phase drift: ${phasePercent}%`, width / 2, height - 40);
      ctx.textAlign = 'left';
      
      // Draw both patterns
      for (let i = 0; i < intervals.length; i++) {
        const x = startX + i * spacing;
        
        // Pattern 1 (top)
        const isCurrent1 = i === currentIndex[0];
        const alpha1 = isCurrent1 ? 1 : 0.15;
        const radius1 = isCurrent1 ? 20 : 8;
        const hue1 = 200 + intervals[i] * 5; // Blue-ish
        drawNote(x, centerY1, radius1, alpha1, hue1);
        
        // Pattern 2 (bottom)
        const isCurrent2 = i === currentIndex[1];
        const alpha2 = isCurrent2 ? 1 : 0.15;
        const radius2 = isCurrent2 ? 20 : 8;
        const hue2 = 30 + intervals[i] * 5; // Orange-ish
        drawNote(x, centerY2, radius2, alpha2, hue2);
        
        // Draw connection line when in phase
        if (isCurrent1 && isCurrent2 && currentIndex[0] === currentIndex[1]) {
          ctx.beginPath();
          ctx.moveTo(x, centerY1 + 30);
          ctx.lineTo(x, centerY2 - 30);
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      
      // Draw connection when aligned
      if (currentIndex[0] === currentIndex[1]) {
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.textAlign = 'center';
        ctx.font = '16px system-ui';
        ctx.fillText('▲ in phase ▲', width / 2, height / 2);
        ctx.textAlign = 'left';
      }
    }
    
    function animate(time) {
      update(time);
      draw(time);
      requestAnimationFrame(animate);
    }
    
    // Interaction
    let isDragging = false;
    let dragStartY = 0;
    let dragStartDrift = 0;
    
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStartY = e.clientY;
      dragStartDrift = driftRate;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaY = dragStartY - e.clientY;
        driftRate = Math.max(0.0001, Math.min(0.002, dragStartDrift + deltaY * 0.00001));
      }
    });
    
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    canvas.addEventListener('click', (e) => {
      if (!isDragging || Math.abs(e.clientY - dragStartY) < 5) {
        // Reset phase
        currentIndex[1] = currentIndex[0];
        lastBeatTime[1] = lastBeatTime[0];
      }
    });
    
    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      isDragging = true;
      dragStartY = e.touches[0].clientY;
      dragStartDrift = driftRate;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (isDragging) {
        const deltaY = dragStartY - e.touches[0].clientY;
        driftRate = Math.max(0.0001, Math.min(0.002, dragStartDrift + deltaY * 0.00001));
      }
    });
    
    canvas.addEventListener('touchend', () => isDragging = false);
    
    // Info panel toggle
    document.getElementById('info-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('info-panel').classList.toggle('visible');
    });
    
    // Navigation
    document.getElementById('nav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      window.location.href = '/';
    });
    
    // Start overlay
    document.getElementById('start-overlay').addEventListener('click', async () => {
      document.getElementById('start-overlay').style.display = 'none';
      await initAudio();
    });
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
