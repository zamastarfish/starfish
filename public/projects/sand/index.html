<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #1a1814;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
    }
    canvas { 
      display: block;
      cursor: crosshair;
    }
    #info {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: rgba(255, 248, 240, 0.25);
      font-size: 11px;
      letter-spacing: 0.1em;
      pointer-events: none;
    }
    
    /* Navigation */
    .sf-nav { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 12px; }
    .sf-nav a, .sf-nav button { 
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 18px; 
      width: 36px; height: 36px; border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.3s; font-family: system-ui, sans-serif;
    }
    .sf-nav a:hover, .sf-nav button:hover { 
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.3);
    }
    /* Modal */
    .sf-modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .sf-modal.open { display: flex; }
    .sf-modal-content {
      background: #111; border: 1px solid #333; border-radius: 12px;
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
      padding: 30px; color: #ddd; font-family: system-ui, sans-serif;
    }
    .sf-modal h2 { margin: 0 0 20px; font-weight: 400; font-size: 24px; color: #fff; }
    .sf-modal h3 { margin: 20px 0 8px; font-weight: 500; font-size: 12px; 
      text-transform: uppercase; letter-spacing: 1px; color: #888; }
    .sf-modal p { margin: 0; line-height: 1.6; font-size: 15px; color: #aaa; }
    .sf-modal-close { 
      position: absolute; top: 20px; right: 20px; background: none; border: none;
      color: #666; font-size: 24px; cursor: pointer; padding: 10px;
    }
    .sf-modal-close:hover { color: #fff; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="sf-nav">
    <a href="/" title="Back to gallery">←</a>
    <button onclick="document.getElementById('sf-modal').classList.add('open')" title="About this piece">?</button>
  </nav>
  
  <!-- Info Modal -->
  <div id="sf-modal" class="sf-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <button class="sf-modal-close" onclick="document.getElementById('sf-modal').classList.remove('open')">×</button>
    <div class="sf-modal-content">
      <h2>Sand</h2>
      <h3>Concept</h3>
      <p>Digital sand. Each grain falls, settles, piles. Simple physics, satisfying accumulation. A tiny world governed by gravity.</p>
      <h3>Interaction</h3>
      <p>Click and drag to pour sand. Watch it pile up. Press C to clear. Press 1-4 to change sand color.</p>
    </div>
  </div>

  <canvas id="canvas"></canvas>
  <div id="info">drag to pour</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let cellSize = 4;
    let cols, rows;
    let grid;
    let nextGrid;
    let pouring = false;
    let pourX = 0, pourY = 0;
    let hueBase = 30; // Sandy orange
    
    // Color palettes
    const palettes = [
      { hue: 30, sat: 60, name: 'desert' },   // Sandy orange
      { hue: 200, sat: 40, name: 'ocean' },   // Blue-gray
      { hue: 0, sat: 70, name: 'rust' },      // Red-brown  
      { hue: 280, sat: 50, name: 'amethyst' } // Purple
    ];
    let currentPalette = 0;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cols = Math.floor(width / cellSize);
      rows = Math.floor(height / cellSize);
      
      // Preserve existing sand if possible
      const oldGrid = grid;
      const oldCols = oldGrid ? oldGrid.length : 0;
      const oldRows = oldGrid && oldGrid[0] ? oldGrid[0].length : 0;
      
      grid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));
      nextGrid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));
      
      // Copy old sand
      if (oldGrid) {
        for (let x = 0; x < Math.min(cols, oldCols); x++) {
          for (let y = 0; y < Math.min(rows, oldRows); y++) {
            grid[x][y] = oldGrid[x][y];
          }
        }
      }
    }
    
    function createGrain(x, y) {
      const p = palettes[currentPalette];
      return {
        hue: p.hue + (Math.random() - 0.5) * 20,
        sat: p.sat + (Math.random() - 0.5) * 20,
        light: 50 + (Math.random() - 0.5) * 20,
        settled: 0
      };
    }
    
    function inBounds(x, y) {
      return x >= 0 && x < cols && y >= 0 && y < rows;
    }
    
    function isEmpty(x, y) {
      return inBounds(x, y) && !grid[x][y];
    }
    
    function update() {
      // Clear next grid
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          nextGrid[x][y] = null;
        }
      }
      
      // Process from bottom to top, randomly left or right
      for (let y = rows - 1; y >= 0; y--) {
        const dir = Math.random() < 0.5 ? 1 : -1;
        const startX = dir === 1 ? 0 : cols - 1;
        
        for (let i = 0; i < cols; i++) {
          const x = startX + i * dir;
          const grain = grid[x][y];
          
          if (!grain) continue;
          
          // Try to fall
          if (y < rows - 1) {
            // Directly below
            if (!grid[x][y + 1] && !nextGrid[x][y + 1]) {
              nextGrid[x][y + 1] = grain;
              grain.settled = 0;
              continue;
            }
            
            // Diagonal - randomly choose direction first
            const diagDir = Math.random() < 0.5 ? -1 : 1;
            const diag1X = x + diagDir;
            const diag2X = x - diagDir;
            
            if (inBounds(diag1X, y + 1) && !grid[diag1X][y + 1] && !nextGrid[diag1X][y + 1]) {
              nextGrid[diag1X][y + 1] = grain;
              grain.settled = 0;
              continue;
            }
            
            if (inBounds(diag2X, y + 1) && !grid[diag2X][y + 1] && !nextGrid[diag2X][y + 1]) {
              nextGrid[diag2X][y + 1] = grain;
              grain.settled = 0;
              continue;
            }
          }
          
          // Can't move - stay in place
          if (!nextGrid[x][y]) {
            nextGrid[x][y] = grain;
            grain.settled = Math.min(grain.settled + 1, 100);
          }
        }
      }
      
      // Swap grids
      [grid, nextGrid] = [nextGrid, grid];
    }
    
    function pour() {
      if (!pouring) return;
      
      const gridX = Math.floor(pourX / cellSize);
      const gridY = Math.floor(pourY / cellSize);
      
      // Pour a small stream
      for (let i = 0; i < 3; i++) {
        const ox = gridX + Math.floor((Math.random() - 0.5) * 4);
        const oy = gridY + Math.floor((Math.random() - 0.5) * 2);
        
        if (inBounds(ox, oy) && !grid[ox][oy]) {
          grid[ox][oy] = createGrain(ox, oy);
        }
      }
    }
    
    function draw() {
      ctx.fillStyle = '#1a1814';
      ctx.fillRect(0, 0, width, height);
      
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          const grain = grid[x][y];
          if (grain) {
            // Settled grains get slightly darker
            const settledDim = grain.settled > 10 ? 5 : 0;
            ctx.fillStyle = `hsl(${grain.hue}, ${grain.sat}%, ${grain.light - settledDim}%)`;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
          }
        }
      }
      
      // Pour indicator
      if (pouring) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(pourX, pourY, 8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function animate() {
      pour();
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Event handlers
    window.addEventListener('resize', resize);
    
    function startPour(x, y) {
      pouring = true;
      pourX = x;
      pourY = y;
    }
    
    function movePour(x, y) {
      pourX = x;
      pourY = y;
    }
    
    function stopPour() {
      pouring = false;
    }
    
    canvas.addEventListener('mousedown', (e) => startPour(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', (e) => { if (pouring) movePour(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', stopPour);
    canvas.addEventListener('mouseleave', stopPour);
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      startPour(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      movePour(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvas.addEventListener('touchend', stopPour);
    canvas.addEventListener('touchcancel', stopPour);
    
    window.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') {
        // Clear
        for (let x = 0; x < cols; x++) {
          for (let y = 0; y < rows; y++) {
            grid[x][y] = null;
          }
        }
      } else if (e.key >= '1' && e.key <= '4') {
        currentPalette = parseInt(e.key) - 1;
      }
    });
    
    // Initialize
    resize();
    animate();
  </script>
</body>
</html>
