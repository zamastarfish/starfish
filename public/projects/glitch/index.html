<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glitch — starfish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      overflow: hidden; 
      font-family: monospace;
    }
    canvas { display: block; }
    
    #info-btn, #nav-btn {
      position: fixed;
      bottom: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-btn { right: 20px; }
    #nav-btn { right: 66px; font-size: 14px; }
    #info-btn:hover, #nav-btn:hover {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }
    
    #info-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 280px;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #info-panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #fff;
    }
    #info-panel p { margin: 0 0 8px 0; }
    #info-panel p:last-child { margin: 0; }
    .info-muted { color: rgba(255,255,255,0.5); font-size: 11px; }
    
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
    }
    #start-overlay span {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 0.1em;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="start-overlay"><span>click to corrupt</span></div>
  <canvas id="canvas"></canvas>
  <button id="nav-btn">↖</button>
  <button id="info-btn">?</button>
  <div id="info-panel">
    <h3>glitch</h3>
    <p>Digital corruption as aesthetic. Data bent, pixels displaced, the machine revealing its own materiality.</p>
    <p>Move to introduce errors. Click to trigger catastrophic failure. The image wants to be whole; you won't let it.</p>
    <p class="info-muted">What does it mean when breaking feels like making?</p>
  </div>
  
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let audioStarted = false;
    let glitchIntensity = 0;
    let mouseX = 0, mouseY = 0;
    let lastMouseX = 0, lastMouseY = 0;
    let catastrophe = 0;
    
    // Audio
    let noise, filter, distortion, bitcrusher;
    let bassDrone, glitchSynth;
    
    // The "original" image - a simple gradient/pattern
    let originalData = null;
    let workingData = null;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      createOriginal();
    }
    
    function createOriginal() {
      // Create a "pristine" image - geometric pattern
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, width, height);
      
      // Grid of shapes
      const gridSize = 80;
      for (let x = gridSize; x < width; x += gridSize) {
        for (let y = gridSize; y < height; y += gridSize) {
          const hue = ((x + y) / (width + height)) * 360;
          ctx.fillStyle = `hsl(${hue}, 60%, 50%)`;
          
          // Alternate between shapes
          if ((x + y) % (gridSize * 2) === 0) {
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(x - 20, y - 20, 40, 40);
          }
        }
      }
      
      // Add some text
      ctx.fillStyle = '#fff';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SIGNAL', width / 2, height / 2 - 30);
      ctx.font = '24px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('stable transmission', width / 2, height / 2 + 20);
      
      // Store original
      originalData = ctx.getImageData(0, 0, width, height);
      workingData = ctx.getImageData(0, 0, width, height);
    }
    
    async function initAudio() {
      await Tone.start();
      
      // Noise floor
      noise = new Tone.Noise('white').start();
      filter = new Tone.Filter(200, 'lowpass').toDestination();
      noise.connect(filter);
      noise.volume.value = -30;
      
      // Bit crusher for digital artifacts
      bitcrusher = new Tone.BitCrusher(8).toDestination();
      
      // Glitch synth - harsh, digital
      glitchSynth = new Tone.MetalSynth({
        frequency: 200,
        envelope: { attack: 0.001, decay: 0.1, release: 0.1 },
        harmonicity: 5.1,
        modulationIndex: 32,
        resonance: 4000,
        octaves: 1.5,
        volume: -20
      }).connect(bitcrusher);
      
      // Bass drone
      bassDrone = new Tone.Synth({
        oscillator: { type: 'sawtooth' },
        envelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 }
      }).toDestination();
      bassDrone.volume.value = -25;
      bassDrone.triggerAttack(55); // Low A
      
      audioStarted = true;
    }
    
    function glitchRow(data, y, amount) {
      const shift = Math.floor((Math.random() - 0.5) * amount * 100);
      const rowStart = y * width * 4;
      const rowEnd = rowStart + width * 4;
      
      // Shift entire row
      const temp = new Uint8ClampedArray(width * 4);
      for (let i = 0; i < width * 4; i++) {
        temp[i] = data.data[rowStart + i];
      }
      
      for (let i = 0; i < width * 4; i++) {
        const srcIdx = (i + shift * 4 + width * 4) % (width * 4);
        data.data[rowStart + i] = temp[srcIdx];
      }
    }
    
    function channelShift(data, x, y, radius, amount) {
      // RGB channel separation
      const idx = (y * width + x) * 4;
      const shiftAmount = Math.floor(amount * 20);
      
      for (let dy = -radius; dy < radius; dy++) {
        for (let dx = -radius; dx < radius; dx++) {
          const px = x + dx;
          const py = y + dy;
          if (px < 0 || px >= width || py < 0 || py >= height) continue;
          
          const targetIdx = (py * width + px) * 4;
          const redSrcX = Math.min(width - 1, Math.max(0, px + shiftAmount));
          const blueSrcX = Math.min(width - 1, Math.max(0, px - shiftAmount));
          
          const redSrcIdx = (py * width + redSrcX) * 4;
          const blueSrcIdx = (py * width + blueSrcX) * 4;
          
          data.data[targetIdx] = originalData.data[redSrcIdx]; // R from shifted
          // G stays
          data.data[targetIdx + 2] = originalData.data[blueSrcIdx + 2]; // B from opposite shift
        }
      }
    }
    
    function blockCorrupt(data, x, y, size) {
      // Copy a block from somewhere else
      const srcX = Math.floor(Math.random() * (width - size));
      const srcY = Math.floor(Math.random() * (height - size));
      
      for (let dy = 0; dy < size; dy++) {
        for (let dx = 0; dx < size; dx++) {
          const destX = x + dx;
          const destY = y + dy;
          if (destX >= width || destY >= height) continue;
          
          const srcIdx = ((srcY + dy) * width + (srcX + dx)) * 4;
          const destIdx = (destY * width + destX) * 4;
          
          data.data[destIdx] = originalData.data[srcIdx];
          data.data[destIdx + 1] = originalData.data[srcIdx + 1];
          data.data[destIdx + 2] = originalData.data[srcIdx + 2];
        }
      }
    }
    
    function scanlines(data, intensity) {
      for (let y = 0; y < height; y += 2) {
        for (let x = 0; x < width; x++) {
          const idx = (y * width + x) * 4;
          const darken = 1 - intensity * 0.3;
          data.data[idx] *= darken;
          data.data[idx + 1] *= darken;
          data.data[idx + 2] *= darken;
        }
      }
    }
    
    function update() {
      // Calculate mouse velocity for glitch intensity
      const dx = mouseX - lastMouseX;
      const dy = mouseY - lastMouseY;
      const velocity = Math.sqrt(dx * dx + dy * dy);
      
      glitchIntensity = Math.min(1, velocity / 50);
      glitchIntensity += catastrophe;
      
      // Decay catastrophe
      catastrophe *= 0.98;
      
      lastMouseX = mouseX;
      lastMouseY = mouseY;
      
      // Update audio
      if (audioStarted) {
        filter.frequency.value = 200 + glitchIntensity * 2000;
        noise.volume.value = -30 + glitchIntensity * 20;
        
        // Random glitch sounds
        if (Math.random() < glitchIntensity * 0.3) {
          glitchSynth.triggerAttackRelease(100 + Math.random() * 500, '32n');
        }
        
        // Pitch bend the drone based on corruption
        const detune = glitchIntensity * 100 * (Math.random() - 0.5);
        bassDrone.detune.value = detune;
      }
    }
    
    function draw() {
      // Start from original
      workingData = new ImageData(
        new Uint8ClampedArray(originalData.data),
        width,
        height
      );
      
      // Apply glitch effects based on intensity
      if (glitchIntensity > 0.01) {
        // Row displacement
        const numRows = Math.floor(glitchIntensity * 50);
        for (let i = 0; i < numRows; i++) {
          const y = Math.floor(Math.random() * height);
          glitchRow(workingData, y, glitchIntensity);
        }
        
        // Channel shift around cursor
        if (mouseX > 0 && mouseY > 0) {
          channelShift(workingData, Math.floor(mouseX), Math.floor(mouseY), 
            50 + glitchIntensity * 100, glitchIntensity);
        }
        
        // Block corruption
        const numBlocks = Math.floor(glitchIntensity * 10);
        for (let i = 0; i < numBlocks; i++) {
          const bx = Math.floor(Math.random() * width);
          const by = Math.floor(Math.random() * height);
          const size = 20 + Math.floor(Math.random() * glitchIntensity * 80);
          blockCorrupt(workingData, bx, by, size);
        }
        
        // Scanlines
        scanlines(workingData, glitchIntensity);
      }
      
      // Draw the corrupted image
      ctx.putImageData(workingData, 0, 0);
      
      // Occasional full-screen flash on high corruption
      if (glitchIntensity > 0.7 && Math.random() < 0.1) {
        ctx.fillStyle = `rgba(255,255,255,${glitchIntensity * 0.3})`;
        ctx.fillRect(0, 0, width, height);
      }
      
      // Status text
      ctx.fillStyle = glitchIntensity > 0.5 ? '#f00' : 'rgba(255,255,255,0.3)';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      const status = glitchIntensity < 0.1 ? 'SIGNAL OK' : 
                     glitchIntensity < 0.5 ? 'SIGNAL DEGRADED' : 
                     'CRITICAL FAILURE';
      ctx.fillText(status, 20, 30);
      ctx.fillText(`corruption: ${(glitchIntensity * 100).toFixed(0)}%`, 20, 50);
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Interaction
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('click', () => {
      // Catastrophic failure
      catastrophe = 1;
      if (audioStarted) {
        glitchSynth.triggerAttackRelease(50 + Math.random() * 200, '8n');
      }
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    });
    
    canvas.addEventListener('touchstart', (e) => {
      catastrophe = 1;
      if (audioStarted) {
        glitchSynth.triggerAttackRelease(50 + Math.random() * 200, '8n');
      }
    });
    
    // Info panel
    document.getElementById('info-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('info-panel').classList.toggle('visible');
    });
    
    document.getElementById('nav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      window.location.href = '/';
    });
    
    // Start overlay
    document.getElementById('start-overlay').addEventListener('click', async () => {
      document.getElementById('start-overlay').style.display = 'none';
      await initAudio();
    });
    
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
